    document.body.appendChild(el);
    setTimeout(()=>el.classList.add('out'),780);
    setTimeout(()=>{ el.remove(); res(); },1080);
  });
}
function endBattle(winner){
  battleState.winner=winner; battleState.turn='end';
  if(winner==='player'){ incrementStat('wins',1); addXp(15); addGravillons(10); addGems(WIN_GEMS); grantFoodLoot(); }
  else { incrementStat('losses',1); }
  screen='combat-result'; render();
}
async function playerAction(moveId){
  if(!battleState||battleState.turn!=='player') return;
  if(moveId==='flee'){
    if(Math.random()<0.5){
      showToast('🏃 Tu t\'es enfui(e) sans la moindre dignité...');
      incrementStat('losses',1);
      battleState=null; screen='combat-pick'; render();
    } else {
      addCombatLog(`${battleState.playerRock.name} tente de fuir... et se rate !`,'neutral');
      battleState.turn='animating'; render();
      setTimeout(beginBotTurn,800);
    }
    return;
  }
  if(moveId==='feed'){
    const result=consumeFoodHeal(true);
    if(!result){ showToast('Tu n\'as pas de nourriture !'); return; }
    addCombatLog(`${result.food.emoji} ${battleState.playerRock.name} mange : ${result.food.name} (+${result.healAmt} PV) !`,'neutral');
    spawnHitFx('playerSprite',{dmg:result.healAmt,heal:true,color:'#27AE60'});
    battleState.turn='animating'; render();
    setTimeout(beginBotTurn,800);
    return;
  }
  const move=soloMoves(battleState.playerRock).find(m=>m.id===moveId);
  if(!move) return;
  if((battleState.playerEnergy||0)<move.cost){ showToast(`⚡ Il faut ${move.cost} d'énergie pour ça !`); return; }
  battleState.turn='animating'; render();
  const pr=battleState.playerRock;
  // Confusion : risque de se blesser
  if(hasStatus('player','confusion') && Math.random()<0.3){
    const d=Math.max(4,Math.round(battleState.playerMaxHP*0.05));
    battleState.playerHP=Math.max(0,battleState.playerHP-d);
    battleState.playerEnergy=Math.min(100,(battleState.playerEnergy||0)+ENERGY_ACT);
    addCombatLog(`💫 ${pr.name} est confus et se cogne : -${d} PV`,'dmg-player');
    spawnHitFx('playerSprite',{dmg:d,color:'#FF4081'});
    render();
    if(battleState.playerHP<=0) return endBattle('bot');
    return setTimeout(beginBotTurn,850);
  }
  const timing=await timingChallenge('attack');
  const elemental=move.kind!=='basic';
  const tMult=elemental?typeMultiplier(pr.rockType,battleState.botRock.rockType):1;
  const miss=hasStatus('player','aveugle')&&Math.random()<0.35;
  let dmg=0, crit=false;
  if(!miss){
    dmg=calcDmg(pr.atk,battleState.botRock.def,move.mult*tMult);
    if(battleState.critPending){ dmg=Math.round(dmg*2); crit=true; battleState.critPending=false; }
    dmg=Math.round(dmg*outgoingMult('player')*timing);
    if(move.kind!=='ultimate') dmg=Math.round(dmg*incomingMult('bot'));
    dmg=Math.max(1,dmg);
  }
  await playAttackAnim('playerSprite','botSprite',{dmg:miss?null:dmg,crit:crit||timing>=1.6,ultimate:move.kind==='ultimate',effective:tMult>1?'super':tMult<1?'weak':null,color:attackColor(pr,moveId)});
  battleState.playerEnergy=Math.min(100,(battleState.playerEnergy||0)-move.cost+ENERGY_ACT);
  battleState.botEnergy=Math.min(100,(battleState.botEnergy||0)+ENERGY_HIT);
  if(miss){
    addCombatLog(`✨ ${pr.name} est aveuglé et rate son attaque !`,'neutral');
  } else {
    battleState.botHP=Math.max(0,battleState.botHP-dmg);
    if(elemental) applyMoveStatus('player','bot',pr, move.kind==='ultimate'?((TYPE_STATUS[pr.rockType]||{}).turns||2)+1:null);
    let msg;
    if(move.kind==='ultimate') msg=`🌟 ULTIME ! ${pr.name} déchaîne sa puissance`;
    else if(move.kind==='special') msg=`⚡ ${pr.name} : ${(pr.specialMove||'Spéciale').split('(')[0].trim()}`;
    else if(move.kind==='type') msg=`${move.label} ${pr.name} frappe`;
    else msg=`${pr.name} frappe`;
    if(crit) msg='💥 CRITIQUE ! '+msg;
    const eff=tMult>1?' (super efficace !)':tMult<1?' (peu efficace...)':'';
    const perf=timing>=1.6?' ✨':'';
    addCombatLog(`${msg} : -${dmg} PV${eff}${perf}`,'dmg-bot');
  }
  if(battleState.botHP<=0) return endBattle('player');
  render();
  setTimeout(beginBotTurn,850);
}

async function beginBotTurn(){
  if(!battleState) return;
  battleState.turn='animating'; render();
  await announceTurn('foe');
  if(!battleState||battleState.turn==='end') return;
  const tick=tickStatuses('bot');
  render();
  if(tick.dead) return endBattle('player');
  if(tick.skip){
    addCombatLog(`❄️ ${battleState.botRock.name} est gelé et ne peut pas bouger !`,'dmg-bot');
    render();
    return setTimeout(beginPlayerTurn,1050);
  }
  setTimeout(botAct,600);
}
function pickBotMoveSolo(){
  const bot=battleState.botRock;
  const e=battleState.botEnergy||0;
  const moves=soloMoves(bot).filter(m=>e>=m.cost);
  const weights={attack:28,type:34,special:26,ultimate:26};
  const total=moves.reduce((s,m)=>s+(weights[m.id]||10),0);
  let r=Math.random()*total;
  for(const m of moves){ const w=weights[m.id]||10; if(r<w) return m; r-=w; }
  return moves[0]||soloMoves(bot)[0];
}
async function botAct(){
  if(!battleState) return;
  const bot=battleState.botRock;
  const move=pickBotMoveSolo();
  // Confusion du bot
  if(hasStatus('bot','confusion') && Math.random()<0.3){
    const d=Math.max(4,Math.round(battleState.botMaxHP*0.05));
    battleState.botHP=Math.max(0,battleState.botHP-d);
    battleState.botEnergy=Math.min(100,(battleState.botEnergy||0)+ENERGY_ACT);
    addCombatLog(`💫 ${bot.name} est confus et se cogne : -${d} PV`,'dmg-bot');
    spawnHitFx('botSprite',{dmg:d,color:'#FF4081'});
    render();
    if(battleState.botHP<=0) return endBattle('player');
    return setTimeout(beginPlayerTurn,850);
  }
  const elemental=move.kind!=='basic';
  const tMult=elemental?typeMultiplier(bot.rockType,battleState.playerRock.rockType):1;
  const miss=hasStatus('bot','aveugle')&&Math.random()<0.35;
  const shieldBlock=!!battleState.shieldActive;
  let dmg=0;
  if(!miss){
    dmg=calcDmg(bot.atk,battleState.playerRock.def,move.mult*tMult);
    dmg=Math.round(dmg*outgoingMult('bot'));
    if(move.kind!=='ultimate') dmg=Math.round(dmg*incomingMult('player'));
    dmg=Math.max(1,dmg);
  }
  let parry=1;
  if(!miss && !shieldBlock) parry=await timingChallenge('parry');
  if(shieldBlock) dmg=0; else if(!miss) dmg=Math.max(1,Math.round(dmg*parry));
  await playAttackAnim('botSprite','playerSprite',{dmg:(miss)?null:dmg,ultimate:move.kind==='ultimate',effective:tMult>1?'super':tMult<1?'weak':null,color:attackColor(bot,move.id)});
  battleState.botEnergy=Math.min(100,(battleState.botEnergy||0)-move.cost+ENERGY_ACT);
  battleState.playerEnergy=Math.min(100,(battleState.playerEnergy||0)+ENERGY_HIT);
  if(shieldBlock){
    battleState.shieldActive=false;
    addCombatLog(`🛡️ Le bouclier absorbe l'attaque de ${bot.name} !`,'neutral');
  } else if(miss){
    addCombatLog(`✨ ${bot.name} est aveuglé et rate son attaque !`,'neutral');
  } else {
    battleState.playerHP=Math.max(0,battleState.playerHP-dmg);
    if(elemental) applyMoveStatus('bot','player',bot, move.kind==='ultimate'?((TYPE_STATUS[bot.rockType]||{}).turns||2)+1:null);
    let msg;
    if(move.kind==='ultimate') msg=`🌟 ULTIME ! ${bot.name} déchaîne sa puissance`;
    else if(move.kind==='special') msg=`⚡ ${bot.name} : ${(bot.specialMove||'Attaque Surprise').split('(')[0].trim()}`;
    else if(move.kind==='type') msg=`${move.label} ${bot.name} frappe`;
    else msg=`${bot.name} contre-attaque`;
    const eff=tMult>1?' (super efficace !)':tMult<1?' (peu efficace...)':'';
    const par=parry<=0.15?' 🛡️PARFAIT':parry<1?' 🛡️paré':'';
    addCombatLog(`${msg} : -${dmg} PV${eff}${par}`,'dmg-player');
  }
  if(battleState.playerHP<=0) return endBattle('bot');
  render();
  setTimeout(beginPlayerTurn,700);
}
async function beginPlayerTurn(){
  if(!battleState) return;
  battleState.turnCount=(battleState.turnCount||0)+1;
  battleState.turn='animating';
  const tick=tickStatuses('player');
  render();
  if(tick.dead){ return endBattle('bot'); }
  if(tick.skip){
    addCombatLog(`❄️ ${battleState.playerRock.name} est gelé et ne peut pas bouger !`,'dmg-player');
    render();
    return setTimeout(beginBotTurn,1050);
  }
  await announceTurn('player');
  if(!battleState||battleState.turn==='end') return;
  battleState.turn='player'; render();
}

        </div>

function combatFightScreen(){
  const s=battleState;
  const pPct=s.playerHP/s.playerMaxHP, bPct=s.botHP/s.botMaxHP;
  const busy=s.turn!=='player';
  const waitMsg=s.turn==='animating'?`⏳ ${s.botRock.name} réfléchit...`
    :s.turn==='opponent'?`⏳ En attente de ${s.botRock.name}...`:'';
  const enterCls=s.entered?'sprite-idle':'sprite-enter';
  s.entered=true;

  const botVisual=s.botRock.characterPhoto
    ?`<img class="combatant-visual char-photo ${enterCls}" id="botSprite" src="${s.botRock.characterPhoto}" alt="${s.botRock.name}">`
    :s.botSpriteUrl
    ?`<img class="combatant-visual ${enterCls}" id="botSprite" src="${s.botSpriteUrl}" alt="${s.botRock.name}">`
    :`<div class="arena2-emoji-badge combatant-visual ${enterCls}" id="botSprite">${s.botRock.emoji||'🪨'}</div>`;
  const playerVisual=s.playerRock.characterPhoto
    ?`<img class="combatant-visual char-photo ${enterCls}" id="playerSprite" src="${s.playerRock.characterPhoto}" alt="${s.playerRock.name}">`
    :s.playerSpriteUrl
    ?`<img class="combatant-visual ${enterCls}" id="playerSprite" src="${s.playerSpriteUrl}" alt="${s.playerRock.name}">`
    :`<img class="combatant-visual ${enterCls}" id="playerSprite" src="${s.playerRock.animePhoto||s.playerRock.photo}" alt="${s.playerRock.name}">`;

  const typeChip=(r)=>{ const t=ROCK_TYPES.find(x=>x.key===r.rockType); return t?`<div class="bcard-typechip" style="border-color:${t.color};color:${t.color};">${t.label}</div>`:''; };
  const botHex=s.botRock.hex||'#9E9E9E', playerHex=s.playerRock.hex||'#9E9E9E';
  const botTint=(ROCK_TYPES.find(x=>x.key===s.botRock.rockType)||{}).color||botHex;
  const playerTint=(ROCK_TYPES.find(x=>x.key===s.playerRock.rockType)||{}).color||playerHex;
  const sparks=Array.from({length:14},(_,i)=>{const c=['#F7DC6F','#ffffff','#FF8A5C','#8FD8FF'][i%4];return `<span class="cfx-spark" style="left:${(Math.random()*100).toFixed(1)}%;bottom:-6px;background:${c};box-shadow:0 0 6px ${c};animation-duration:${(4+Math.random()*4).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s;width:${(2+Math.random()*2).toFixed(1)}px;height:${(2+Math.random()*2).toFixed(1)}px;"></span>`;}).join('');
  const isSolo=!s.online;
  const statBadges=(side)=>{ if(!isSolo) return ''; const arr=s[side+'Status']||[]; if(!arr.length) return '<div class="stbadges"></div>'; return `<div class="stbadges">`+arr.map(st=>{const d=STATUS_DEFS[st.kind]||{icon:'?',name:'',color:'#fff'};return `<span class="stbadge" style="border-color:${d.color};color:${d.color};">${d.icon}<i>${st.turns}</i></span>`;}).join('')+`</div>`; };
  const nrgBar=(side)=>{ if(!isSolo) return ''; const e=Math.max(0,Math.min(100,s[side+'Energy']||0)); const full=e>=100; return `<div class="nrg-wrap"><div class="nrg-bg"><div class="nrg-fill${full?' full':''}" style="width:${e}%;"></div></div><span class="nrg-lbl${full?' full':''}">⚡${e}</span></div>`; };

  return `<div class="cfx">
    <div class="cfx-bg"></div>
    <div class="cfx-glow cfx-glow-foe" style="background:radial-gradient(circle,${botTint}66,transparent 68%);"></div>
    <div class="cfx-glow cfx-glow-mine" style="background:radial-gradient(circle,${playerTint}66,transparent 68%);"></div>
    <div class="cfx-floor"></div>
    <div class="cfx-sparks">${sparks}</div>
    <div class="cfx-content">
    <div class="bfield">
      <div class="bcard bcard-foe" style="border-color:${botHex};box-shadow:0 10px 26px rgba(0,0,0,.5),0 0 22px ${botTint}55,inset 0 0 22px ${botTint}18;">
        <div class="bcard-role"><span class="bcard-role-pill foe">🎯 ADVERSAIRE</span></div>
        <div class="bcard-img" style="box-shadow:inset 0 0 26px ${botTint}55;">
          <div class="bot-zone bzone">${botVisual}</div>
          ${typeChip(s.botRock)}
        </div>
        <div class="bcard-name">${s.botRock.name}</div>
        <div class="bcard-hprow"><b>${s.botHP}</b>/<span>${s.botMaxHP} PV</span></div>
        <div class="arena-bar-bg"><div class="arena-bar-fill hp-shine" style="width:${bPct*100}%;background:${hpBarColor(bPct)};"></div></div>
        ${nrgBar('bot')}
        ${statBadges('bot')}
      </div>
      <div class="cfx-vs"><span class="cfx-vs-ring"></span><span class="cfx-vs-pulse"></span><b>VS</b></div>
      <div class="bcard bcard-mine" style="border-color:${playerHex};box-shadow:0 10px 26px rgba(0,0,0,.5),0 0 22px ${playerTint}55,inset 0 0 22px ${playerTint}18;">
        <div class="bcard-role"><span class="bcard-role-pill mine">💪 TOI</span></div>
        <div class="bcard-img" style="box-shadow:inset 0 0 26px ${playerTint}55;">
          <div class="player-zone bzone">${playerVisual}</div>
          ${typeChip(s.playerRock)}
        </div>
        <div class="bcard-name">${s.playerRock.name}</div>
        <div class="bcard-hprow"><b>${s.playerHP}</b>/<span>${s.playerMaxHP} PV</span></div>
        <div class="arena-bar-bg"><div class="arena-bar-fill hp-shine" style="width:${pPct*100}%;background:${hpBarColor(pPct)};"></div></div>
        ${nrgBar('player')}
        ${statBadges('player')}
      </div>
    </div>
    <div class="combat-log">
      ${s.log.slice(0,3).map((l,i)=>`<div class="log-line ${l.cls}" style="opacity:${1-i*0.28};">${l.text}</div>`).join('')}
    </div>
    <div class="arena-actions">
      ${isSolo?soloMoves(s.playerRock).map(m=>{
        const e=s.playerEnergy||0; const locked=e<m.cost; const dis=busy||locked;
        const cls=m.kind==='ultimate'?'btn-ultimate':m.kind==='special'?'btn-purple':'btn-gold';
        return `<button class="btn ${cls} mv-btn" ${dis?'disabled':''} style="${dis?'opacity:.42;':''}" data-action="combatMove" data-move="${m.id}">${m.label}${m.cost?`<span class="mv-cost${locked?'':' ready'}">${m.cost}⚡</span>`:''}</button>`;
      }).join('')
      :getAvailableMoves(s.playerRock).map(m=>{
        const used=(m.id==='special'&&s.playerSpecialUsed)||(m.id==='ultimate'&&s.playerUltimateUsed);
        const cls=m.id==='ultimate'?'btn-ultimate':m.id==='special'?'btn-purple':'btn-gold';
        return `<button class="btn ${cls}" ${busy||used?'disabled style="opacity:.4;"':''} data-action="combatMove" data-move="${m.id}">${m.label}</button>`;
      }).join('')}
    </div>
    <div class="arena-actions" style="margin-top:8px;">
      ${(()=>{ const f=bestAvailableFood(); return `<button class="btn-feed" ${busy||!f?'disabled style="opacity:.35;"':''} data-action="combatMove" data-move="feed">${f?f.emoji+' Nourrir ('+f.name+')':'🍖 Nourrir (vide)'}</button>`; })()}
      <button class="btn btn-flee" ${busy?'disabled':''} data-action="combatMove" data-move="flee">🏃 Fuir lâchement</button>
    </div>
    ${(waitMsg&&s.online)?`<div style="text-align:center;font-family:'Nunito',sans-serif;font-size:12px;color:rgba(255,255,255,.45);margin-top:6px;">${waitMsg}</div>`:''}
    </div>
  </div>`;
}

function combatResultScreen(){
  const s=battleState;
  const won=s.winner==='player';
  const draw=s.winner==='draw';
  const banner=won?'VICTOIRE !':draw?'ÉGALITÉ':'DÉFAITE...';
  const sub=won?`${s.playerRock.name} écrase ${s.botRock.name} dans un nuage de poussière !`
    :draw?'Les deux cailloux s\'effondrent simultanément. Nul !'
    :`${s.botRock.name} t\'a complètement roulé dessus.`;
  const emoji=won?'🏆':draw?'🤝':'💀';
  return `<div class="result-wrap">
    <div style="font-size:64px;animation:resultBounce .5s cubic-bezier(.34,1.56,.64,1);">${emoji}</div>
    <div class="result-banner ${won?'result-win':draw?'result-draw':'result-lose'}">${banner}</div>
    <p class="result-sub">${sub}</p>
    ${won?`<div style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;color:#F7DC6F;margin:-2px 0 6px;">🏆 Récompense : +${WIN_GEMS} 💎 &nbsp;+${s.online?20:10} 🪙</div>`:''}
    <div class="result-stats">
      <div class="result-stat-item"><div class="result-stat-val">${meta.wins||0}</div><div class="result-stat-lbl">VICTOIRES</div></div>
      <div class="result-stat-item"><div class="result-stat-val">${meta.losses||0}</div><div class="result-stat-lbl">DÉFAITES</div></div>
    </div>
    ${(()=>{
      if(s.online&&onlineState&&onlineState.rematchIncoming){
        return `<div style="font-family:'Baloo 2',sans-serif;font-weight:800;font-size:13px;color:#C45CFF;margin-bottom:8px;">⚔️ Ton adversaire veut une revanche !</div>
          <div class="btn-row">
            <button class="btn btn-ghost" data-action="rematchDecline">Refuser</button>
            <button class="btn btn-gold" data-action="rematchAccept">✅ Accepter</button>
          </div>`;
      }
      if(s.online&&onlineState&&onlineState.rematchRequested){
        return `<button class="btn btn-ghost" disabled style="opacity:.6;">⏳ Revanche demandée — en attente...</button>`;
      }
      return `<button class="btn btn-gold" data-action="combatRematch">🔄 REVANCHE</button>`;
    })()}
    <button class="btn btn-ghost" style="margin-top:8px;" data-action="goto" data-screen="home">🏠 Accueil</button>
  </div>`;
}

function challengeMatches(rock,challenge){
  if(!rock||!challenge) return false;
  switch(challenge.id){
    case 'white': return rock.colorCategory==='clair';
    case 'dark': return rock.colorCategory==='sombre';
    case 'shiny': return !!rock.shiny;
    case 'big': return (rock.sizeCm||0)>10;
    case 'tiny': return (rock.sizeCm||0)>0&&rock.sizeCm<3;
    case 'any': return true;
    default: return false;
  }
}

function stopCharGenTimer(){
  if(charGenTimerInterval){ clearInterval(charGenTimerInterval); charGenTimerInterval=null; }
  generatingCharacter=false; charGenStartTime=null;
}

async function callPollinations(prompt, retries=3){
  const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&model=turbo&nologo=true&seed=${Date.now()}`;
  for(let i=1;i<=retries;i++){
    try{
      const res=await fetch(url,{signal:AbortSignal.timeout(15000)});
      if(res.ok){
        const blob=await res.blob();
        return await new Promise((ok,ko)=>{ const r=new FileReader(); r.onload=()=>ok(r.result); r.onerror=ko; r.readAsDataURL(blob); });
      }
      console.warn(`Pollinations attempt ${i}: HTTP ${res.status}`);
    }catch(e){ console.warn(`Pollinations attempt ${i} failed:`,e.message); }
    if(i<retries) await new Promise(r=>setTimeout(r,1000));
  }
  return null;
}

async function generateCharacterForRock(rock){
  if(!rock||!session||generatingCharacter) return;
  if((rock.charGenCount||0)>=CHAR_GEN_MAX){ showToast(`🔒 Maximum ${CHAR_GEN_MAX} générations atteint pour ce caillou`); return; }
  generatingCharacter=true; charGenStartTime=Date.now();
  charGenTimerInterval=setInterval(render, 1000);
  render();
  try{
    const rawUrl=await callPollinations(buildCharacterPrompt(rock));
    if(!rawUrl){ showToast('❌ Génération échouée — service indisponible, réessaie dans un instant'); stopCharGenTimer(); render(); return; }
    rock.charGenCount=(rock.charGenCount||0)+1;
    if(dex.find(r=>r.id===rock.id)&&session&&sb){
      sb.from('rocks').update({ char_gen_count: rock.charGenCount }).eq('id',rock.id).eq('user_id',session.user.id).then(()=>{});
    }
    const cleanUrl=rawUrl;
    const mime=(cleanUrl.match(/^data:([^;]+);/)||[])[1]||'image/png';
    characterResult={ image: cleanUrl.split(',')[1], mimeType: mime, rockId: rock.id };
    stopCharGenTimer(); render();
  }catch(e){
    showToast('❌ Erreur: '+e.message);
    console.error('generateCharacterForRock', e);
    stopCharGenTimer(); render();
  }
}

  }

  const rTier=RARITY_TIERS.find(t=>t.key===rock.rarity)||RARITY_TIERS[0];

  const updates={

    sizeCm:sizeCm?Math.round(sizeCm*10)/10:rock.sizeCm,

  else if(action==='pickSplash'){ splashRock=dex.find(r=>r.id===t.dataset.id)||splashRock; splashPhase='idle'; render(); }
  else if(action==='openAdmin'){ openAdmin(); }
  else if(action==='adminSubmitPw'){ adminSubmitPw(); }
  else if(action==='adminForgotPw'){ adminForgotPw(); }
  else if(action==='adminTab'){ setAdminTab(t.dataset.tab); }
  else if(action==='adminSearchPlayer'){ adminSearchPlayer(); }
  else if(action==='adminGive'){ adminGive(t.dataset.field, parseInt(t.dataset.amt,10)||0); }
  else if(action==='adminResetPlayer'){ adminResetPlayer(t.dataset.uid, t.dataset.name); }
  else if(action==='adminDeletePlayer'){ adminDeletePlayer(t.dataset.uid, t.dataset.name); }
  else if(action==='adminDeleteReport'){ adminDeleteReport(t.dataset.id); }
  else if(action==='adminDeleteReportedAccount'){ adminDeleteReportedAccount(t.dataset.id, t.dataset.uid, t.dataset.name); }
  else if(action==='adminSaveAnnounce'){ adminSaveAnnounce(); }
  else if(action==='dismissAnn'){ try{ localStorage.setItem(t.dataset.key,'1'); }catch(e){} const bn=document.getElementById('annBanner'); if(bn) bn.remove(); }
  else if(action==='loginGoogle'){ signInWithGoogle(); }
  else if(action==='logout'){ signOut(); }
  else if(action==='deleteAccount'){
    if(confirm('Supprimer définitivement ton compte ? Ton dex, tes badges, ton niveau et tes Gravillons seront perdus pour toujours. Cette action est IRRÉVERSIBLE.')){
      if(confirm('Es-tu vraiment sûr(e) ? Il n\'y a pas de retour en arrière possible.')) deleteAccount();
    }
  }
  else if(action==='saveUsername'){
    const v=(document.getElementById('usernameInput')||{}).value||'';
    setUsername(v);
  }
  else if(action==='startBattle'){
    const rock=dex.find(r=>r.id===t.dataset.id);
    if(rock) initBattle(rock);
  }
  else if(action==='combatMove'){
    const moveId=t.dataset.move;
    if(battleState&&battleState.online) playerOnlineAction(moveId);
    else playerAction(moveId);
  }
  else if(action==='combatRematch'){
    if(battleState&&battleState.online){
      if(onlineState&&onlineState.conn&&onlineState.conn.open){
        try{ onlineState.conn.send({type:'rematch-request'}); }catch(e){}
        onlineState.rematchRequested=true; showToast('🔄 Demande de revanche envoyée...'); render();
      } else {
        showToast('Adversaire déconnecté.');
        battleState=null; try{ if(onlineState&&onlineState.peer) onlineState.peer.destroy(); }catch(e){} onlineState=null;
        screen='online-menu'; render();
      }
    }
    else if(battleState){ initBattle(battleState.playerRock); }
    else { screen='combat-pick'; render(); }
  }
  else if(action==='rematchAccept'){
    if(onlineState&&onlineState.conn&&onlineState.conn.open){ try{ onlineState.conn.send({type:'rematch-accept'}); }catch(e){} startRematch(); }
    else { showToast('Adversaire déconnecté.'); battleState=null; onlineState=null; screen='online-menu'; render(); }
  }
  else if(action==='rematchDecline'){
    if(onlineState&&onlineState.conn&&onlineState.conn.open){ try{ onlineState.conn.send({type:'rematch-decline'}); }catch(e){} }
    if(onlineState) onlineState.rematchIncoming=false;
    battleState=null; screen='online-menu'; render();
  }
  else if(action==='onlineCreate'){ createOnlineSalle(); }
  else if(action==='onlineJoin'){
    const code=((document.getElementById('joinCodeInput')||{}).value||'').trim().toUpperCase();
    if(code.length<4){ showToast('❌ Code invalide !'); return; }
    joinOnlineSalle(code);
  }
  else if(action==='onlineCancel'){ cancelOnline(); }
  else if(action==='onlinePickRock'){
    const rock=dex.find(r=>r.id===t.dataset.id);
    if(rock) pickOnlineRock(rock);
  }
  else if(action==='togglePhoto'){
    const id=t.dataset.id;
    const rock=findRockById(id);
    const altPhoto=rock?.characterPhoto||rock?.animePhoto;
    if(!rock||!altPhoto) return;
    photoToggleState[id]=!photoToggleState[id];
    const img=document.getElementById('rockImg_'+id);
    if(img) img.src=photoToggleState[id]?rock.photo:altPhoto;
  }
});

document.getElementById('fileInput').addEventListener('change',(e)=>{
  const file=e.target.files[0]; e.target.value=''; handleFile(file);
});

// --- Suivi d'erreurs (best-effort, anti-spam) : pour voir ce qui casse en prod ---
let _errCount=0, _errWindow=0;
function logError(kind,message,stack){
  try{
    const now=Date.now();
    if(now-_errWindow>60000){ _errWindow=now; _errCount=0; }
    if(_errCount++>=6) return;
    console.warn('[app-error]',kind,message);
    if(typeof sb!=='undefined'&&sb){
      sb.from('app_errors').insert({
        user_id: (typeof session!=='undefined'&&session)?session.user.id:null,
        kind, message:String(message||'').slice(0,500), stack:String(stack||'').slice(0,2000),
        url:location.href, ua:(navigator.userAgent||'').slice(0,300),
      }).then(()=>{},()=>{});
    }
  }catch(e){}
}
window.addEventListener('error',e=>{ logError('error', e.message, e.error&&e.error.stack); });
window.addEventListener('unhandledrejection',e=>{ const r=e&&e.reason; logError('promise', (r&&r.message)||r, r&&r.stack); });

if('serviceWorker' in navigator) window.addEventListener('load',()=>{
  // L'app avait-elle deja un service worker actif au chargement ?
  // Si oui, un changement de controleur = nouvelle version deployee -> on recharge.
  // Si non (toute premiere visite), on ne recharge pas inutilement.
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing || !hadController) return;
    refreshing = true;
    window.location.reload();
  });
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    // Verifie s'il existe une nouvelle version a chaque fois que l'app revient au premier plan...
    document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') reg.update(); });
    // ...et periodiquement tant qu'elle reste ouverte.
    setInterval(()=>{ reg.update(); }, 30*60*1000);
  }).catch(()=>{});
});

(async function init(){
  applyTimeTheme();
  screen='loading'; render();
  try{
    await loadSupabaseLib();
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const { data }=await sb.auth.getSession();
    session=data.session;
    sb.auth.onAuthStateChange((event,sess)=>{
      const wasLoggedOut=!session;
      session=sess;
      if(event==='SIGNED_IN'&&wasLoggedOut){ migrateLocalDexIfNeeded().then(loadCloudData).then(maybeResetLaunch).then(maybeResetCharGen).then(()=>{ screen='home'; render(); startChallengePolling(); startChallengeRealtime(); }); }
      else if(event==='SIGNED_OUT'){ stopChallengeRealtime(); dex=[]; meta={ streak:0, lastCaptureDate:null, badges:[], shared:0, todayChallenge:null, challengeDate:null, challengeCompletedDate:null, wins:0, losses:0, xp:0,
    gravillons:0, gems:0, inventory:{}, food:{}, luckyBoostUntil:null, streakFreezeCount:0, ownedFrames:[], equippedFrame:null, customTitle:null, username:null }; screen='login'; render(); }
    });
    if(session){ await migrateLocalDexIfNeeded(); await loadCloudData(); await maybeResetLaunch(); await maybeResetCharGen(); await checkPendingChallenge(); startChallengePolling(); startChallengeRealtime(); }
    try{ await loadAnnouncement(); }catch(e){}
  }catch(e){ showToast('❌ Connexion au serveur impossible. Réessaie.'); }
  getDailyChallenge();
  screen=session?'home':'login';
  render();
})();
</script>
