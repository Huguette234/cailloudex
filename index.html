/* ===== SPRITES DE COMBAT (découpe organique depuis la photo) ===== */
function hashStr(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))|0; return Math.abs(h)||1; }
function seededRandom(seed){
  let s=seed%2147483647; if(s<=0) s+=2147483646;
  return function(){ s=s*16807%2147483647; return (s-1)/2147483646; };
}
function rockBlobPath(ctx,cx,cy,baseR,seed){
  const rand=seededRandom(seed);
  const n=10+Math.floor(rand()*4);
  const pts=[];
  for(let i=0;i<n;i++){
    const angle=(i/n)*Math.PI*2;
    const r=baseR*(0.7+rand()*0.34);
    pts.push([cx+Math.cos(angle)*r,cy+Math.sin(angle)*r]);
  }
  const mid=(a,b)=>[(a[0]+b[0])/2,(a[1]+b[1])/2];
  ctx.beginPath();
  const m0=mid(pts[n-1],pts[0]);
  ctx.moveTo(m0[0],m0[1]);
  for(let i=0;i<n;i++){
    const next=pts[(i+1)%n];
    const m=mid(pts[i],next);
    ctx.quadraticCurveTo(pts[i][0],pts[i][1],m[0],m[1]);
  }
  ctx.closePath();
}
function makeRockSprite(photoDataUrl,seedStr){
  return new Promise(resolve=>{
    if(!photoDataUrl){ resolve(null); return; }
    const img=new Image();
    img.onload=()=>{
      try{
        const S=300;
        const c=document.createElement('canvas'); c.width=S; c.height=S;
        const ctx=c.getContext('2d');
        const seed=hashStr(String(seedStr||'rock'));
        ctx.save();
        rockBlobPath(ctx,S/2,S/2,S*0.43,seed);
        ctx.clip();
        const scale=Math.max(S/img.width,S/img.height)*1.15;
        const w=img.width*scale, h=img.height*scale;
        ctx.drawImage(img,S/2-w/2,S/2-h/2,w,h);
        const shade=ctx.createRadialGradient(S*0.36,S*0.30,S*0.04,S/2,S/2,S*0.48);
        shade.addColorStop(0,'rgba(255,255,255,0.22)');
        shade.addColorStop(0.55,'rgba(255,255,255,0)');
        shade.addColorStop(1,'rgba(0,0,0,0.38)');
        ctx.fillStyle=shade;
        ctx.fillRect(0,0,S,S);
        ctx.restore();
        resolve(c.toDataURL('image/png'));
      }catch(e){ resolve(null); }
    };
    img.onerror=()=>resolve(null);
    img.src=photoDataUrl;
  });
}
function playAttackAnim(attackerId,defenderId){
  return new Promise(resolve=>{
    const atkEl=document.getElementById(attackerId);
    const defEl=document.getElementById(defenderId);
    if(atkEl) atkEl.classList.add('lunge');
    setTimeout(()=>{
      if(defEl) defEl.classList.add('hit-shake');
      if(navigator.vibrate) navigator.vibrate(40);
      resolve();
      setTimeout(()=>{
        if(atkEl) atkEl.classList.remove('lunge');
        if(defEl) defEl.classList.remove('hit-shake');
      },430);
    },260);
  });
}

async function generateBotCharacter(botRock){
  const key=botRock.name;
  if(BOT_CHARACTER_CACHE[key]){
    if(battleState&&battleState.botRock.name===key){
      battleState.botRock.characterPhoto=BOT_CHARACTER_CACHE[key]; render();
    }
    return;
  }
  try{
    const rawUrl=await callPollinations(buildCharacterPrompt({
      name:botRock.name, rockType:botRock.rockType, personality:botRock.specialMove||'',
      atk:botRock.atk||10, def:botRock.def||10, vit:botRock.vit||1, rarity:'commun',
    }));
    if(!rawUrl) return;
    const cleanUrl=await removeWhiteBackground(rawUrl);
    BOT_CHARACTER_CACHE[key]=cleanUrl;
    if(battleState&&battleState.botRock.name===key){
      battleState.botRock.characterPhoto=cleanUrl; render();
    }
  }catch(e){ console.error('generateBotCharacter',e); }
}

function makeBotRock(){
  const base=BOT_POOL[Math.floor(Math.random()*BOT_POOL.length)];
  const tier=rollRarity(0);
  return Object.assign({},base,{
    rarity:tier.key, rarityLabel:tier.label, hex:tier.hex,
    atk:rollStat(tier.range), def:rollStat(tier.range), vit:rollStat([1,8]),
  });
}

function combatMaxHP(def){ return 50+def*4; }

function calcDmg(atkStat,defStat,multiplier=1){
  const raw=Math.max(1, atkStat - Math.floor(defStat/6) + Math.floor(Math.random()*16) - 8);
  return Math.max(1,Math.round(raw*multiplier));
}
function getAvailableMoves(rock){
  const typeInfo=ROCK_TYPES.find(t=>t.key===rock.rockType);
  const moves=[
    { id:'attack', label:'⚔️ ATTAQUE', mult:1 },
    { id:'type', label:typeInfo?typeInfo.label:'⬜ TYPE', mult:1, isType:true },
  ];
  if(rock.rarity!=='commun'){
    moves.push({ id:'special', label:'⚡ '+(rock.specialMove||'SPÉCIALE').split(' ').slice(0,3).join(' '), mult:1.6, onceOnly:true });
  }
  if(rock.rarity==='legendaire'||rock.evolved){
    moves.push({ id:'ultimate', label:'🌟 ULTIME', mult:2.3, onceOnly:true });
  }
  return moves;
}

  if((meta.inventory?.mighty||0)>0){

    log:[{text:`⚔️ ${playerRock.name} affronte ${bot.name} !`, cls:'neutral'}],
    turn:'player', winner:null, entered:false,
    playerSpriteUrl, botSpriteUrl:null,

}

async function playerAction(moveId){
  if(!battleState||battleState.turn!=='player') return;
  if(moveId==='flee'){
    if(Math.random()<0.5){
      showToast('🏃 Tu t\'es enfui(e) sans la moindre dignité...');
      incrementStat('losses',1);
      battleState=null; screen='combat-pick'; render();
    } else {
      addCombatLog(`${battleState.playerRock.name} tente de fuir... et se rate !`,'neutral');
      battleState.turn='animating'; render();
      setTimeout(botTurn,900);
    }
    return;
  }
  if(moveId==='feed'){
    const result=consumeFoodHeal(true);
    if(!result){ showToast('Tu n\'as pas de nourriture !'); return; }
    addCombatLog(`${result.food.emoji} ${battleState.playerRock.name} mange : ${result.food.name} (+${result.healAmt} PV) !`,'neutral');
    battleState.turn='animating'; render();
    setTimeout(botTurn,900);
    return;
  }
  const moves=getAvailableMoves(battleState.playerRock);
  const move=moves.find(m=>m.id===moveId);
  if(!move) return;
  if(move.onceOnly){
    const usedFlag=moveId==='special'?'playerSpecialUsed':'playerUltimateUsed';
    if(battleState[usedFlag]){ showToast('Déjà utilisée !'); return; }
  }
  battleState.turn='animating'; render();
  await playAttackAnim('playerSprite','botSprite');
  const tMult=move.isType?typeMultiplier(battleState.playerRock.rockType,battleState.botRock.rockType):1;
  let dmg=calcDmg(battleState.playerRock.atk,battleState.botRock.def,move.mult*tMult);
  const wasCrit=battleState.critPending;
  if(wasCrit){ dmg=Math.round(dmg*2); battleState.critPending=false; }
  if(moveId==='special') battleState.playerSpecialUsed=true;
  if(moveId==='ultimate') battleState.playerUltimateUsed=true;
  battleState.botHP=Math.max(0,battleState.botHP-dmg);
  const typeTxt=move.isType?(tMult>1?' (super efficace !)':tMult<1?' (peu efficace...)':''):'';
  let msg;
  if(moveId==='ultimate') msg=`🌟 ULTIME ! ${battleState.playerRock.name} déchaîne sa puissance`;
  else if(moveId==='special') msg=`⚡ ${battleState.playerRock.name} : ${battleState.playerRock.specialMove||'Attaque Spéciale'}`;
  else if(moveId==='type') msg=`${move.label} ${battleState.playerRock.name} frappe`;
  else msg=`${battleState.playerRock.name} frappe ${battleState.botRock.name}`;
  if(wasCrit) msg='💥 CRITIQUE ! '+msg;
  addCombatLog(`${msg} : -${dmg} PV${typeTxt}`,'dmg-bot');
  if(battleState.botHP<=0){
    battleState.winner='player'; battleState.turn='end';
    incrementStat('wins',1);
    addXp(15); addGravillons(10);
    grantFoodLoot();
    screen='combat-result'; render(); return;
  }
  render();
  setTimeout(botTurn,900);
}

function pickBotMove(bot){
  const moves=getAvailableMoves(bot);
  const usable=moves.filter(m=>{
    if(m.id==='special') return !battleState.botSpecialUsed;
    if(m.id==='ultimate') return !battleState.botUltimateUsed;
    return true;
  });
  const weights={attack:35,type:35,special:20,ultimate:10};
  const total=usable.reduce((s,m)=>s+(weights[m.id]||10),0);
  let r=Math.random()*total;
  for(const m of usable){ const w=weights[m.id]||10; if(r<w) return m; r-=w; }
  return usable[0];
}
async function botTurn(){
  if(!battleState) return;
  const bot=battleState.botRock;
  const move=pickBotMove(bot);
  await playAttackAnim('botSprite','playerSprite');
  const tMult=move.isType?typeMultiplier(bot.rockType,battleState.playerRock.rockType):1;
  let dmg=calcDmg(bot.atk,battleState.playerRock.def,move.mult*tMult);
  if(move.id==='special') battleState.botSpecialUsed=true;
  if(move.id==='ultimate') battleState.botUltimateUsed=true;
  if(battleState.shieldActive){
    battleState.shieldActive=false; dmg=0;
    addCombatLog(`🛡️ Le bouclier absorbe complètement l'attaque de ${bot.name} !`,'neutral');
  } else {
    const typeTxt=move.isType?(tMult>1?' (super efficace !)':tMult<1?' (peu efficace...)':''):'';
    let msg;
    if(move.id==='ultimate') msg=`🌟 ULTIME ! ${bot.name} déchaîne sa puissance`;
    else if(move.id==='special') msg=`⚡ ${bot.name} : ${bot.specialMove||'Attaque Surprise'}`;
    else if(move.id==='type') msg=`${move.label} ${bot.name} frappe`;
    else msg=`${bot.name} contre-attaque`;
    addCombatLog(`${msg} : -${dmg} PV${typeTxt}`,'dmg-player');
  }
  battleState.playerHP=Math.max(0,battleState.playerHP-dmg);
  if(battleState.playerHP<=0){
    battleState.winner='bot'; battleState.turn='end';
    incrementStat('losses',1);
    screen='combat-result'; render(); return;
  }
  battleState.turn='player'; render();
}

let photoToggleState={};
async function handleFile(file){
  if(!file) return;
  try{
    const dataUrl=await resizeImage(file);
    const mod=await moderateImage(dataUrl);
    if(!mod.safe){ showToast('🚫 Cette photo ne peut pas être utilisée'); return; }
    pendingPhoto=dataUrl;
    animePhoto=null;
    screen='scanning'; render();

    let scanMsgIdx=0;
    const scanEl=()=>document.getElementById('scanMsg');
    scanMsgInterval=setInterval(()=>{
      scanMsgIdx=(scanMsgIdx+1)%SCAN_MESSAGES.length;
      const el=scanEl(); if(el) el.textContent=SCAN_MESSAGES[scanMsgIdx];
    },1200);

    const [aiResult,,location]=await Promise.all([
      analyzeWithAI(dataUrl),
      delay(1600),
      Promise.race([getLocation(),delay(4500).then(()=>null)])
    ]);

    clearInterval(scanMsgInterval);

    if(aiResult && aiResult.is_rock===false){
      showToast('🚫 '+(aiResult.reject_reason||"Ça, ce n'est pas un caillou. Réessaie avec un vrai !"));
      pendingPhoto=null; animePhoto=null;
      screen='scanner'; render();
      return;
    }

    await bumpStreak();
    await saveMeta();

    let tier;
    if((meta.inventory?.sacred||0)>0){ meta.inventory.sacred--; tier=RARITY_TIERS[RARITY_TIERS.length-1]; saveMeta(); setTimeout(()=>showToast('👑 Caillou Sacré activé !'),200); }
    else if((meta.inventory?.blessed||0)>0){ meta.inventory.blessed--; tier=pickAtLeast('epique'); saveMeta(); setTimeout(()=>showToast('🌟 Caillou Béni activé !'),200); }
    else if((meta.inventory?.lucky||0)>0){ meta.inventory.lucky--; tier=pickAtLeast('rare'); saveMeta(); setTimeout(()=>showToast('🎲 Caillou Chanceux activé !'),200); }
    else { tier=rollRarity(meta.streak); }
    const typeInfo=aiResult?.type ? (ROCK_TYPES.find(t=>t.key===aiResult.type)||pickType()) : pickType();
    const sizeCm=aiResult?.size_cm ? Math.min(60,Math.max(0.5,Number(aiResult.size_cm))) : null;
    const aiDef=aiResult?.def ? Math.min(99,Math.max(1,Math.round(aiResult.def))) : null;
    const finalDef=aiDef ? Math.max(aiDef,minDefForSize(sizeCm)) : rollStat(tier.range);

    revealRock={
      id: Date.now().toString(36)+Math.random().toString(36).slice(2),
      catalogNumber: dex.length+1,
      photo: dataUrl,
      name: aiResult?.name || genName(),
      personality: aiResult?.personality || null,
      quip: aiResult?.quip || pickQuip(),
      specialMove: aiResult?.special_move || pickSpecialMove(),
      rockType: typeInfo.key,
      typeLabel: typeInfo.label,
      typeColor: typeInfo.color,
      location: location||null,
      rarity: tier.key,
      rarityLabel: tier.label,
      hex: tier.hex,
      sizeCm: sizeCm ? Math.round(sizeCm*10)/10 : null,
      atk: aiResult?.atk ? Math.min(99,Math.max(1,Math.round(aiResult.atk))) : rollStat(tier.range),
      def: finalDef,
      vit: aiResult?.vit ? Math.min(99,Math.max(1,Math.round(aiResult.vit))) : rollStat([1,8]),
      confettiCount: tier.confetti,
      aiGenerated: !!aiResult,
      date: new Date().toISOString(),
      colorCategory: aiResult?.color_category || null,
      shiny: !!aiResult?.shiny,
    };

    animePhoto=await createAnimeArt(dataUrl,tier.hex);
    revealRock.animePhoto=animePhoto;

    if(navigator.vibrate) navigator.vibrate([30,50,30]);
    screen='anime'; render();
    spawnConfetti(revealRock.confettiCount,revealRock.hex);

  }catch(e){
    clearInterval(scanMsgInterval);
    showToast('Échantillon illisible, réessaie 🪨');
    screen='scanner'; render();
  }
}

function challengeMatches(rock,challenge){
  if(!rock||!challenge) return false;
  switch(challenge.id){
    case 'white': return rock.colorCategory==='clair';
    case 'dark': return rock.colorCategory==='sombre';
    case 'shiny': return !!rock.shiny;
    case 'big': return (rock.sizeCm||0)>10;
    case 'tiny': return (rock.sizeCm||0)>0&&rock.sizeCm<3;
    case 'any': return true;
    default: return false;
  }
}
const CHALLENGE_XP_BONUS=25, CHALLENGE_GRAVILLON_BONUS=20;
async function confirmAdd(){
  if(!revealRock||!session) return;
  try{
    const { data, error } = await sb.from('rocks').insert(rockToRow(revealRock,session.user.id)).select().single();
    if(error) throw error;
    dex.push(rowToRock(data));
    addXp(XP_BY_RARITY[revealRock.rarity]||10);
    addGravillons(GRAVILLON_BY_RARITY[revealRock.rarity]||5);
    const t=todayStr();
    if(meta.challengeDate===t&&meta.challengeCompletedDate!==t&&challengeMatches(revealRock,meta.todayChallenge)){

function removeWhiteBackground(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width; c.height=img.height;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0);
      const imageData=ctx.getImageData(0,0,c.width,c.height);
      const data=imageData.data;
      const w=c.width, h=c.height, n=w*h;
      const mask=new Uint8Array(n); // 1 = fond (a supprimer)

      const bright=(pos)=>{ const d=pos*4; return (data[d]+data[d+1]+data[d+2])/3; };
      // Seuil adaptatif : on regarde les 4 coins pour estimer la teinte du fond.
      // Fond clair (blanc ou gris clair) -> on l'enleve ; fond sombre -> on ne
      // touche a rien (impossible de decouper un perso sombre sur fond sombre).
      const cAvg=(bright(0)+bright(w-1)+bright((h-1)*w)+bright(n-1))/4;
      const BG=cAvg>=185?Math.max(172,Math.min(222,cAvg-18)):222;
      const LO=Math.max(150,BG-26), HI=BG+24; // bande de transition (anti-halo)

      // 1) Remplissage depuis les bords : seuls les pixels clairs relies au bord
      //    sont consideres comme fond (les zones claires du perso sont preservees).
      const queue=[];
      const visit=(pos)=>{
        if(pos<0||pos>=n||mask[pos]) return;
        if(bright(pos)<=BG){ mask[pos]=2; return; }
        mask[pos]=1; queue.push(pos);
      };
      for(let x=0;x<w;x++){ visit(x); visit((h-1)*w+x); }
      for(let y=0;y<h;y++){ visit(y*w); visit(y*w+w-1); }
      let qi=0;
      while(qi<queue.length){
        const pos=queue[qi++];
        const x=pos%w, y=(pos/w)|0;
        if(x>0) visit(pos-1);
        if(x<w-1) visit(pos+1);
        if(y>0) visit(pos-w);
        if(y<h-1) visit(pos+w);
      }

      // 2) Alpha de base + de-fringe : sur le contour du perso qui touche le fond,
      //    on attenue les pixels quasi-blancs (le halo) proportionnellement.
      const alpha=new Uint8ClampedArray(n);
      for(let i=0;i<n;i++) alpha[i]=(mask[i]===1)?0:255;
      for(let i=0;i<n;i++){
        if(!alpha[i]) continue;
        const x=i%w, y=(i/w)|0;
        const edge=(x>0&&mask[i-1]===1)||(x<w-1&&mask[i+1]===1)||(y>0&&mask[i-w]===1)||(y<h-1&&mask[i+w]===1);
        if(edge){
          const t=Math.max(0,Math.min(1,(bright(i)-LO)/(HI-LO)));
          alpha[i]=Math.round(255*(1-t));
        }
      }

      // 3) Leger lissage 3x3 de l'alpha : bords doux, anti-creneles.
      for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
          const i=y*w+x;
          let s=0,cnt=0;
          for(let dy=-1;dy<=1;dy++){
            const yy=y+dy; if(yy<0||yy>=h) continue;
            for(let dx=-1;dx<=1;dx++){
              const xx=x+dx; if(xx<0||xx>=w) continue;
              s+=alpha[yy*w+xx]; cnt++;
            }
          }
          data[i*4+3]=Math.round(s/cnt);
        }
      }

      ctx.putImageData(imageData,0,0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

function stopCharGenTimer(){
  if(charGenTimerInterval){ clearInterval(charGenTimerInterval); charGenTimerInterval=null; }
  generatingCharacter=false; charGenStartTime=null;
}

async function callPollinations(prompt, retries=3){
  const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&model=turbo&nologo=true&seed=${Date.now()}`;
  for(let i=1;i<=retries;i++){
    try{
      const res=await fetch(url,{signal:AbortSignal.timeout(15000)});
      if(res.ok){
        const blob=await res.blob();
        return await new Promise((ok,ko)=>{ const r=new FileReader(); r.onload=()=>ok(r.result); r.onerror=ko; r.readAsDataURL(blob); });
      }
      console.warn(`Pollinations attempt ${i}: HTTP ${res.status}`);
    }catch(e){ console.warn(`Pollinations attempt ${i} failed:`,e.message); }
    if(i<retries) await new Promise(r=>setTimeout(r,1000));
  }
  return null;
}

async function generateCharacterForRock(rock){
  if(!rock||!session||generatingCharacter) return;
  if((rock.charGenCount||0)>=CHAR_GEN_MAX){ showToast(`🔒 Maximum ${CHAR_GEN_MAX} générations atteint pour ce caillou`); return; }
  generatingCharacter=true; charGenStartTime=Date.now();
  charGenTimerInterval=setInterval(render, 1000);
  render();
  try{
    const rawUrl=await callPollinations(buildCharacterPrompt(rock));
    if(!rawUrl){ showToast('❌ Génération échouée — service indisponible, réessaie dans un instant'); stopCharGenTimer(); render(); return; }
    rock.charGenCount=(rock.charGenCount||0)+1;
    if(dex.find(r=>r.id===rock.id)&&session&&sb){
      sb.from('rocks').update({ char_gen_count: rock.charGenCount }).eq('id',rock.id).eq('user_id',session.user.id).then(()=>{});
    }
    const cleanUrl=await removeWhiteBackground(rawUrl);
    characterResult={ image: cleanUrl.split(',')[1], mimeType: 'image/png', rockId: rock.id };
    stopCharGenTimer(); render();
  }catch(e){
    showToast('❌ Erreur: '+e.message);
    console.error('generateCharacterForRock', e);
    stopCharGenTimer(); render();
  }
}

async function rerollRockAI(rockId){
  const rock=dex.find(r=>r.id===rockId);
  if(!rock||!session) return;
  if((meta.inventory?.reroll||0)<=0){ showToast('Tu n\'as pas de Re-roll IA. Achète-en à la boutique !'); return; }
  showToast('🔄 Nouvelle analyse en cours...');
  const aiResult=await analyzeWithAI(rock.photo);
  if(!aiResult||aiResult.is_rock===false){
    showToast('❌ L\'IA n\'a pas pu réanalyser ce caillou. Réessaie.');
    return;
  }
  meta.inventory.reroll--;
  saveMeta();
  const typeInfo=aiResult.type?(ROCK_TYPES.find(t=>t.key===aiResult.type)||null):null;
  const sizeCm=aiResult.size_cm?Math.min(60,Math.max(0.5,Number(aiResult.size_cm))):null;
  const updates={
    name:aiResult.name||rock.name, personality:aiResult.personality||null,
    quip:aiResult.quip||rock.quip, specialMove:aiResult.special_move||rock.specialMove,
    rockType:typeInfo?typeInfo.key:rock.rockType, typeLabel:typeInfo?typeInfo.label:rock.typeLabel, typeColor:typeInfo?typeInfo.color:rock.typeColor,
    atk:aiResult.atk?Math.min(99,Math.max(1,Math.round(aiResult.atk))):rock.atk,
    def:aiResult.def?Math.max(Math.min(99,Math.max(1,Math.round(aiResult.def))),minDefForSize(sizeCm)):rock.def,
    vit:aiResult.vit?Math.min(99,Math.max(1,Math.round(aiResult.vit))):rock.vit,
    sizeCm:sizeCm?Math.round(sizeCm*10)/10:rock.sizeCm,
  };
  try{
    const { error } = await sb.from('rocks').update(rockToRow({...rock,...updates},session.user.id)).eq('id',rockId).eq('user_id',session.user.id);
    if(error) throw error;
    Object.assign(rock,updates);
    detailRock=rock;
    showToast('✨ Caillou réanalysé !');
    render();
  }catch(e){ showToast('❌ Erreur: '+(e?.message||e)); }
}

let _errCount=0, _errWindow=0;
function logError(kind,message,stack){
  try{
    const now=Date.now();
    if(now-_errWindow>60000){ _errWindow=now; _errCount=0; }
    if(_errCount++>=6) return;
    console.warn('[app-error]',kind,message);
    if(typeof sb!=='undefined'&&sb){
      sb.from('app_errors').insert({
        user_id: (typeof session!=='undefined'&&session)?session.user.id:null,
        kind, message:String(message||'').slice(0,500), stack:String(stack||'').slice(0,2000),
        url:location.href, ua:(navigator.userAgent||'').slice(0,300),
      }).then(()=>{},()=>{});
    }
  }catch(e){}
}
window.addEventListener('error',e=>{ logError('error', e.message, e.error&&e.error.stack); });
window.addEventListener('unhandledrejection',e=>{ const r=e&&e.reason; logError('promise', (r&&r.message)||r, r&&r.stack); });

if('serviceWorker' in navigator) window.addEventListener('load',()=>{
  // L'app avait-elle deja un service worker actif au chargement ?
  // Si oui, un changement de controleur = nouvelle version deployee -> on recharge.
  // Si non (toute premiere visite), on ne recharge pas inutilement.
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing || !hadController) return;
    refreshing = true;
    window.location.reload();
  });
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    // Verifie s'il existe une nouvelle version a chaque fois que l'app revient au premier plan...
    document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') reg.update(); });
    // ...et periodiquement tant qu'elle reste ouverte.
    setInterval(()=>{ reg.update(); }, 30*60*1000);
  }).catch(()=>{});
});

(async function init(){
  applyTimeTheme();
  screen='loading'; render();
  try{
    await loadSupabaseLib();
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    const { data }=await sb.auth.getSession();
    session=data.session;
    sb.auth.onAuthStateChange((event,sess)=>{
      const wasLoggedOut=!session;
      session=sess;
      if(event==='SIGNED_IN'&&wasLoggedOut){ migrateLocalDexIfNeeded().then(loadCloudData).then(()=>{ screen='home'; render(); startChallengePolling(); startChallengeRealtime(); }); }
      else if(event==='SIGNED_OUT'){ stopChallengeRealtime(); dex=[]; meta={ streak:0, lastCaptureDate:null, badges:[], shared:0, todayChallenge:null, challengeDate:null, challengeCompletedDate:null, wins:0, losses:0, xp:0,
    gravillons:0, gems:0, inventory:{}, food:{}, luckyBoostUntil:null, streakFreezeCount:0, ownedFrames:[], equippedFrame:null, customTitle:null, username:null }; screen='login'; render(); }
    });
    if(session){ await migrateLocalDexIfNeeded(); await loadCloudData(); await checkPendingChallenge(); startChallengePolling(); startChallengeRealtime(); }
  }catch(e){ showToast('❌ Connexion au serveur impossible. Réessaie.'); }
  getDailyChallenge();
  screen=session?'home':'login';
  render();
})();
</script>
