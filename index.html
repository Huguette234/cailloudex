@keyframes pkHalo{0%,100%{transform:scale(.9);opacity:.3;}50%{transform:scale(1.1);opacity:.5;}}
.pk-ring{position:absolute;width:128px;height:128px;border-radius:50%;border:2px solid var(--pk);opacity:0;}
.pk-ring.r1{animation:pkRing 2.8s ease-out infinite;}
.pk-ring.r2{animation:pkRing 2.8s ease-out infinite 1.4s;}
@keyframes pkRing{0%{opacity:.55;transform:scale(.85);}80%{opacity:0;}100%{opacity:0;transform:scale(2.05);}}
.pk-shimmer{position:absolute;width:190px;height:190px;border-radius:50%;background:conic-gradient(from 0deg,transparent,var(--pk) 12%,transparent 30%,transparent 55%,rgba(255,255,255,.65) 66%,transparent 82%);opacity:.4;-webkit-mask:radial-gradient(circle,transparent 61%,#000 63%,#000 71%,transparent 73%);mask:radial-gradient(circle,transparent 61%,#000 63%,#000 71%,transparent 73%);animation:radarSpin 6s linear infinite;}
.pk-orbit{position:absolute;width:212px;height:212px;animation:radarSpin 7s linear infinite;}
.pk-orbit.rev{width:172px;height:172px;animation-direction:reverse;animation-duration:9s;}
.pk-orbdot{position:absolute;top:-3px;left:50%;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 10px var(--pk),0 0 6px #fff;transform:translateX(-50%);}

.pk-gem-face{position:absolute;inset:0;border-radius:26px;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#37547e 0%,#1b2e49 44%,#0b1626 100%);border:2.5px solid var(--pk);

.pk-gem-face::before{content:'';position:absolute;top:-40%;left:-45%;width:70%;height:180%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.24),transparent);transform:rotate(8deg);animation:pkGloss 3.6s ease-in-out infinite;}
@keyframes pkGloss{0%,58%{left:-50%;}86%,100%{left:130%;}}
.pk-gem-shine{position:absolute;top:14px;left:18px;width:40px;height:20px;border-radius:50%;background:rgba(255,255,255,.4);filter:blur(4px);}
.pk-q{position:relative;z-index:2;font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:70px;color:#fff;text-shadow:0 0 22px var(--pk),0 2px 5px rgba(0,0,0,.5);opacity:.95;}
@keyframes pkFloat{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-12px) rotate(1.5deg);}}
.pack-open-btn{position:relative;z-index:1;margin-top:36px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;color:#0D1B2A;border:3px solid var(--ink);border-radius:18px;padding:14px 32px;cursor:pointer;overflow:hidden;transition:opacity .2s,transform .06s,box-shadow .06s;
  background:linear-gradient(135deg,#FFE9A0,#F7DC6F 45%,#E8B923);box-shadow:0 6px 0 rgba(0,0,0,.42),0 0 22px rgba(247,220,111,.35);animation:ctaPulse 1.7s ease-in-out infinite;}
.pack-open-btn::after{content:'';position:absolute;top:0;left:-150%;width:55%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);animation:shineSweep 2.4s ease-in-out infinite;}
.pack-open-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.42);}
@keyframes ctaPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.045);}}
.pack-tease{position:relative;z-index:1;margin-top:16px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:12.5px;text-align:center;opacity:.9;text-shadow:0 0 12px currentColor;animation:pkHalo 2.4s ease-in-out infinite;}
.pack-stage.pk-open .pk-gem{animation:pkBurst .5s ease-out forwards;}
@keyframes pkBurst{0%{transform:scale(1);}36%{transform:scale(1.32);}100%{transform:scale(0);opacity:0;}}
.pack-stage.pk-open .pk-halo{animation:pkFlash .5s ease-out forwards;}
@keyframes pkFlash{0%{transform:scale(1);opacity:.8;}100%{transform:scale(3.4);opacity:0;}}
.rarity-banner{position:fixed;top:36%;left:0;right:0;z-index:66;display:flex;justify-content:center;pointer-events:none;}
.rarity-banner span{font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:34px;color:#fff;letter-spacing:.03em;padding:6px 24px;text-shadow:0 0 20px var(--pk),0 3px 6px rgba(0,0,0,.6);animation:rbIn .5s cubic-bezier(.2,1.4,.5,1) both,rbOut .35s ease-in 1.05s forwards;}

/* ===== MINI-JEU PLOUF ===== */
.splash-game{padding:8px 14px 24px;max-width:460px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}
.splash-head{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.splash-title{font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:24px;color:#fff;}
.splash-record{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:11px;color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:4px 11px;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.splash-scene{position:relative;width:100%;height:60vh;min-height:390px;max-height:560px;border-radius:22px;overflow:hidden;border:2px solid rgba(255,255,255,.14);box-shadow:0 14px 38px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.06);
  background:linear-gradient(180deg,#7ec2ee 0%,#a3d6f2 28%,#c9e9f6 48%,#e8f5f6 60%,#eef7f7 64%);}
/* Soleil + halo */
.sp-sun{position:absolute;top:7%;right:20%;width:40px;height:40px;border-radius:50%;z-index:1;background:radial-gradient(circle,#fffdf0 32%,#ffe9a6 60%,rgba(255,221,130,0) 74%);box-shadow:0 0 46px 24px rgba(255,238,180,.5);animation:spSun 5s ease-in-out infinite;}
@keyframes spSun{0%,100%{filter:brightness(1);}50%{filter:brightness(1.12);}}
/* Collines lointaines (profondeur, brume) — juste au-dessus de l'eau */
.sp-hills{position:absolute;left:0;right:0;top:58%;height:6%;z-index:1;overflow:hidden;}
.sp-hills::before,.sp-hills::after{content:'';position:absolute;bottom:-42%;border-radius:50%;filter:blur(2px);}
.sp-hills::before{left:-15%;width:82%;height:100%;background:#93afc7;opacity:.42;}
.sp-hills::after{right:-12%;width:66%;height:80%;background:#809eb8;opacity:.48;}
/* Nuages doux */
.sp-cloud{position:absolute;height:15px;border-radius:999px;background:rgba(255,255,255,.92);filter:blur(1px);z-index:1;}
.sp-cloud::before,.sp-cloud::after{content:'';position:absolute;background:inherit;border-radius:50%;}
.sp-cloud::before{width:58%;height:190%;top:-75%;left:12%;}
.sp-cloud::after{width:42%;height:150%;top:-46%;right:12%;}
.sp-cloud.c1{width:62px;top:9%;left:13%;animation:spCloud 24s ease-in-out infinite;}
.sp-cloud.c2{width:44px;top:20%;right:15%;opacity:.85;animation:spCloud 30s ease-in-out infinite reverse;}
.sp-cloud.c3{width:34px;top:14%;left:53%;opacity:.68;animation:spCloud 27s ease-in-out infinite;}
@keyframes spCloud{0%,100%{transform:translateX(0);}50%{transform:translateX(20px);}}
/* Eau réaliste — surface vue en perspective, profondeur, reflets */
.sp-water-gl{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;}
.sp-water{position:absolute;left:0;right:0;top:64%;bottom:0;z-index:2;overflow:hidden;perspective:230px;perspective-origin:50% 0;
  background:
    radial-gradient(130% 70% at 50% -6%,rgba(196,236,248,.55),rgba(150,214,236,0) 46%),
    linear-gradient(180deg,#79bfe4 0%,#57a2cf 14%,#3b83b4 34%,#2a6a98 56%,#1a527e 76%,#103c5e 100%);}
/* Reflet clair du ciel juste sous l'horizon */
.sp-water::before{content:'';position:absolute;top:0;left:0;right:0;height:20%;background:linear-gradient(180deg,rgba(226,245,252,.6),transparent);}
/* Ondulations en perspective : lignes qui reculent vers l'horizon */
.sp-caustics{position:absolute;left:-40%;right:-40%;top:0;bottom:-30%;transform-origin:50% 0;transform:rotateX(74deg) scale(1,2.1);
  background:repeating-linear-gradient(0deg,transparent 0 7px,rgba(255,255,255,.10) 7px 9px,transparent 9px 15px);
  -webkit-mask:linear-gradient(180deg,transparent,#000 16%,#000 100%);mask:linear-gradient(180deg,transparent,#000 16%,#000 100%);
  animation:spCaustics 6.5s linear infinite;}
@keyframes spCaustics{from{background-position:0 0;}to{background-position:0 16px;}}
/* Fines rides secondaires (détail, plus lentes) */
.sp-waves{position:absolute;left:-40%;right:-40%;top:0;bottom:-30%;transform-origin:50% 0;transform:rotateX(76deg) scale(1,2.4);opacity:.6;
  background:repeating-linear-gradient(0deg,transparent 0 12px,rgba(255,255,255,.06) 12px 13px);
  -webkit-mask:linear-gradient(180deg,transparent,#000 20%,#000 100%);mask:linear-gradient(180deg,transparent,#000 20%,#000 100%);
  animation:spWaves 9s linear infinite;}
@keyframes spWaves{from{background-position:0 0;}to{background-position:0 26px;}}
/* Chemin scintillant du soleil sur l'eau (triangle qui s'élargit vers l'avant) */
.sp-glint{position:absolute;top:0;right:13%;width:20%;height:100%;
  clip-path:polygon(36% 0,64% 0,100% 100%,0 100%);
  background:linear-gradient(180deg,rgba(255,248,212,.9),rgba(255,240,182,.42) 32%,rgba(255,235,158,.14) 62%,transparent 90%);
  -webkit-mask:linear-gradient(180deg,#000,#000 56%,transparent);mask:linear-gradient(180deg,#000,#000 56%,transparent);
  filter:blur(1px);animation:spGlint 2.4s ease-in-out infinite;}
.sp-glint::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0 4px,rgba(255,255,255,.55) 4px 6px,transparent 6px 12px);
  -webkit-mask:linear-gradient(180deg,#000,transparent 72%);mask:linear-gradient(180deg,#000,transparent 72%);
  animation:spGlintSparkle 1.1s steps(6) infinite;}
@keyframes spGlint{0%,100%{opacity:.6;transform:scaleX(.82);}50%{opacity:1;transform:scaleX(1.18);}}
@keyframes spGlintSparkle{from{background-position:0 0;}to{background-position:0 11px;}}
.sp-surface{position:absolute;top:64%;left:0;right:0;height:3px;z-index:3;background:linear-gradient(90deg,transparent,rgba(255,255,255,.95),transparent);box-shadow:0 0 12px rgba(255,255,255,.6),0 1px 5px rgba(120,200,240,.5);}
/* Pont en bois détaillé (SVG : grain de bois, rambarde, boulons) */
.sp-bridge{position:absolute;top:10.5%;left:0;right:0;height:62px;z-index:4;}
.sp-bridge-svg{position:absolute;inset:0;width:100%;height:100%;display:block;filter:drop-shadow(0 6px 10px rgba(0,0,0,.3));}
/* Caillou */
.sp-rock{position:absolute;top:15%;left:50%;width:48px;height:48px;z-index:5;transform:translateX(-50%);}
.sp-rock img{width:100%;height:100%;border-radius:12px;object-fit:cover;border:2px solid rgba(255,255,255,.75);box-shadow:0 6px 12px rgba(0,0,0,.45);}
.sp-rock.sp-hidden{opacity:0;}
@keyframes spFall{0%{top:15%;transform:translateX(-50%) rotate(0) scale(1);}72%{transform:translateX(-50%) rotate(300deg) scale(.94);}100%{top:61%;transform:translateX(-50%) rotate(382deg) scale(.66);}}
.sp-rock.sp-falling{animation:spFall 1.25s cubic-bezier(.45,0,.82,.5) forwards;}
.sp-vignette{position:absolute;inset:0;z-index:8;pointer-events:none;box-shadow:inset 0 0 55px rgba(0,22,44,.28),inset 0 -26px 40px rgba(0,12,30,.22);}
.sp-splash-layer{position:absolute;top:64%;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;}
.sp-burst{position:absolute;left:0;top:0;width:66px;height:34px;border-radius:50%;background:radial-gradient(ellipse at 50% 45%,#fff,var(--col) 58%,transparent 74%);animation:spBurst .55s ease-out forwards;}
@keyframes spBurst{0%{transform:translate(-50%,-20%) scale(.2);opacity:.95;}55%{opacity:.9;}100%{transform:translate(-50%,-95%) scale(var(--sc));opacity:0;}}
.sp-ripple{position:absolute;left:0;top:0;width:44px;height:15px;border:2px solid rgba(255,255,255,.75);border-radius:50%;animation:spRipple 1.15s ease-out forwards;}
@keyframes spRipple{0%{transform:translate(-50%,-50%) scale(.3);opacity:.85;}100%{transform:translate(-50%,-50%) scale(calc(var(--sc)*2.4));opacity:0;}}
.sp-drop{position:absolute;left:0;top:0;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#a7d4ee 72%,#6ba8d0);box-shadow:0 1px 3px rgba(20,60,100,.45);animation:spDrop .82s cubic-bezier(.25,-.2,.7,1) forwards;}
@keyframes spDrop{0%{transform:translate(-50%,-50%);opacity:1;}75%{opacity:1;}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy)));opacity:0;}}
/* ===== Éclaboussure 3D : gerbe centrale + goutte + couronne + dôme ===== */
.sp-jet{position:absolute;left:0;top:0;width:calc(14px*var(--sc));height:calc(46px*var(--sc));transform:translate(-50%,-100%) scaleY(0);transform-origin:bottom center;
  background:linear-gradient(to top,rgba(92,155,194,.92),rgba(150,206,236,.94) 46%,rgba(242,251,255,.98));
  border-radius:46% 46% 44% 44%;
  box-shadow:0 0 8px rgba(20,65,105,.5),inset -2px 0 3px rgba(20,60,100,.4),inset 2px 0 4px rgba(255,255,255,.55);
  animation:spJet .6s cubic-bezier(.2,.7,.4,1) forwards;}
@keyframes spJet{0%{transform:translate(-50%,-100%) scaleY(0) scaleX(.55);opacity:.9;}34%{transform:translate(-50%,-100%) scaleY(1.15) scaleX(1);opacity:1;}62%{transform:translate(-50%,-100%) scaleY(.8) scaleX(.85);opacity:.9;}100%{transform:translate(-50%,-100%) scaleY(0) scaleX(.45);opacity:0;}}
.sp-bead{position:absolute;left:0;top:0;width:calc(11px*var(--sc));height:calc(11px*var(--sc));border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#b6def5 66%,#6ba8d0);box-shadow:0 1px 5px rgba(20,60,100,.5);animation:spBead .62s cubic-bezier(.25,.6,.5,1) forwards;}
@keyframes spBead{0%{transform:translate(-50%,-150%) scale(.3);opacity:0;}28%{opacity:1;}46%{transform:translate(-50%,calc(-150% - 44px*var(--sc))) scale(1);opacity:1;}100%{transform:translate(-50%,calc(-150% - 20px*var(--sc))) scale(.5);opacity:0;}}
.sp-dome{position:absolute;left:0;top:0;width:calc(48px*var(--sc));height:calc(24px*var(--sc));transform:translate(-50%,-64%) scale(.3);transform-origin:bottom center;
  background:radial-gradient(ellipse at 50% 100%,rgba(255,255,255,.96),rgba(164,212,240,.78) 48%,rgba(80,145,188,.32) 70%,transparent 80%);border-radius:50%;filter:drop-shadow(0 1px 2px rgba(20,60,100,.42));animation:spDome .5s ease-out forwards;}
@keyframes spDome{0%{transform:translate(-50%,-64%) scale(.28);opacity:.95;}100%{transform:translate(-50%,-64%) scale(1.35);opacity:0;}}
.sp-result{position:absolute;top:28%;left:50%;z-index:7;width:88%;text-align:center;line-height:1.12;font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:21px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.7),0 0 18px rgba(255,255,255,.4);opacity:0;transform:translateX(-50%);}
.sp-result.show{animation:spResult 1.5s ease both;}
@keyframes spResult{0%{opacity:0;transform:translateX(-50%) scale(.4);}18%{opacity:1;transform:translateX(-50%) scale(1.12);}32%{transform:translateX(-50%) scale(1);}80%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-22px) scale(1);}}
.sp-pick-label{font-family:'Nunito',sans-serif;font-size:11px;color:rgba(255,255,255,.5);margin:14px 0 6px;text-align:center;}
.sp-picker{display:flex;gap:8px;overflow-x:auto;width:100%;padding:2px 2px 6px;-webkit-overflow-scrolling:touch;}
.sp-thumb{width:48px;height:48px;flex-shrink:0;border-radius:11px;object-fit:cover;border:2px solid;opacity:.55;cursor:pointer;transition:opacity .15s,transform .15s;}
.sp-thumb.sel{opacity:1;box-shadow:0 0 0 2px #fff,0 0 12px currentColor;transform:scale(1.06);}
</style>

<body>
<div id="skyDeco"></div>
<div class="stars" id="stars"></div>
<svg class="ground-svg" id="groundSvg" viewBox="0 0 400 130" preserveAspectRatio="none"></svg>
<div class="frame" id="app"></div>
<div class="grain-overlay"></div>
<div class="vignette-overlay"></div>
<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
<script>
/* ===== DATA ===== */
const STAT_CAP = 150;
const RARITY_TIERS = [
  { key:'commun', label:'COMMUN', hex:'#6FCF53', hdark:'#3A8C20', range:[5,25], confetti:0 },
  { key:'rare', label:'RARE', hex:'#2D9CDB', hdark:'#1560A0', range:[20,45], confetti:12 },
  { key:'epique', label:'ÉPIQUE', hex:'#C45CFF', hdark:'#8020C0', range:[40,65], confetti:25 },
  { key:'legendaire', label:'LÉGENDAIRE', hex:'#FFD700', hdark:'#B8900A', range:[60,85], confetti:45 },
  { key:'mythique', label:'MYTHIQUE', hex:'#FF4D6D', hdark:'#B01030', range:[80,102], confetti:60 },
  { key:'cosmique', label:'COSMIQUE', hex:'#22E0D6', hdark:'#0E8C86', range:[98,122], confetti:85 },
  { key:'galaxie', label:'GALAXIE', hex:'#7C4DFF', hdark:'#4A1FA0', range:[118,145], confetti:120 },
];

const ROCK_TYPES = [
  { key:'feu', label:'🔥 FEU', color:'#FF6B35', desc:'Chaud dehors. Encore plus chaud à l\'intérieur. Risque d\'incendie élevé.' },
  { key:'glace', label:'❄️ GLACE', color:'#74B9FF', desc:'Froid et distant. Exactement comme ton ex.' },
  { key:'ombre', label:'🌑 OMBRE', color:'#8E44AD', desc:'Mystérieux. Probablement au courant de choses. Ne parle pas.' },
  { key:'lumiere', label:'✨ LUMIÈRE', color:'#F7DC6F', desc:'Brillant et impossiblement optimiste. Tout le monde le déteste un peu.' },
  { key:'metal', label:'⚙️ MÉTAL', color:'#95A5A6', desc:'Dur. Fiable. N\'a pas d\'état d\'âme. Le collègue idéal.' },
  { key:'nature', label:'🌿 NATURE', color:'#27AE60', desc:'100% naturel. Bio. Sans gluten. Vegan par défaut et sans effort.' },
  { key:'chaos', label:'💥 CHAOS', color:'#FF4081', desc:'Imprévisible. Refuse de suivre les règles. Probablement volcan.' },
  { key:'neutre', label:'⬜ NEUTRE', color:'#9E9E9E', desc:'Existe. C\'est déjà honnêtement pas mal.' },
];

/* ===== TYPES — forces/faiblesses ===== */
const TYPE_CHART = {
  feu:{strong:['nature'],weak:['glace']},
  glace:{strong:['feu'],weak:['metal']},
  metal:{strong:['glace'],weak:['nature']},
  nature:{strong:['metal'],weak:['feu']},
  ombre:{strong:['lumiere'],weak:['chaos']},
  lumiere:{strong:['ombre'],weak:['metal']},
  chaos:{strong:['feu','glace','metal','nature','ombre','lumiere'],weak:['neutre']},
  neutre:{strong:[],weak:[]},
};
function typeMultiplier(atkType,defType){
  const chart=TYPE_CHART[atkType];
  if(!chart||!defType) return 1;
  if(chart.strong.includes(defType)) return 1.5;
  if(chart.weak.includes(defType)) return 0.67;
  return 1;
}

/* ===== NOURRITURE — soin en combat ===== */
const FOOD_ITEMS = [
  { id:'crouton', name:'Croûton Minéral', emoji:'🍞', heal:0.20, lootChance:0.18, price:'0,99 €' },
  { id:'fromage', name:'Fromage de Schiste', emoji:'🧀', heal:0.35, lootChance:0.08, price:'1,99 €' },

];
function bestAvailableFood(){
  for(const f of FOOD_ITEMS){ if((meta.food?.[f.id]||0)>0) return f; }
  return null;
}
function grantFoodLoot(){
  let food=null;
  for(const f of FOOD_ITEMS){ if(Math.random()<f.lootChance){ food=f; break; } }
  if(!food) return;
  meta.food=meta.food||{};
  meta.food[food.id]=(meta.food[food.id]||0)+1;
  saveMeta();
  setTimeout(()=>showToast(`${food.emoji} Butin de combat : ${food.name} obtenu !`),700);
}
function consumeFoodHeal(isPlayerSide){
  const food=bestAvailableFood();
  if(!food) return null;
  meta.food[food.id]--;
  saveMeta();
  const maxHP=isPlayerSide?battleState.playerMaxHP:battleState.botMaxHP;
  const healAmt=Math.round(maxHP*food.heal);
  if(isPlayerSide) battleState.playerHP=Math.min(battleState.playerMaxHP,battleState.playerHP+healAmt);
  else battleState.botHP=Math.min(battleState.botMaxHP,battleState.botHP+healAmt);
  return { food, healAmt };
}

  if(Math.random()>=SPECIAL_CHANCE) return false;
  const owned=new Set(dex.map(r=>r.name));
  const pool=SPECIAL_ROCKS.filter(s=>!owned.has(s.name));
  if(!pool.length) return false;

  const ti=ROCK_TYPES.find(t=>t.key===sp.rockType)||ROCK_TYPES[ROCK_TYPES.length-1];
  Object.assign(revealRock,{
    name:sp.name, personality:sp.personality, quip:sp.quip, specialMove:sp.specialMove,
    rockType:sp.rockType, typeLabel:ti.label, typeColor:ti.color,
    rarity:'secret', rarityLabel:'✨ SECRET', hex:sp.hex,
    atk:sp.atk, def:sp.def, vit:sp.vit,
    characterPhoto:sp.img||specialArt(sp.emoji, sp.hex, '#0a0a1a'),

}

const BLOCKED_WORDS=['connard','conard','salope','pute','putain','encule','enculé','ntm','nique','fdp','pd','pede','pédé','tapette','bougnoul','negre','nègre','youpin','feuj','pedophile','pédophile','viol','hitler','nazi','kkk','fuck','shit','bitch','nigger','nigga','cunt','faggot','rape','nazi','pedo','porn','sexe','bite','couille','merde'];
function containsBlockedWord(name){
  const n=(name||'').toLowerCase().replace(/[^a-z]/g,'');
  return BLOCKED_WORDS.some(w=>n.includes(w));
}
async function setUsername(name){
  if(!session||!sb) return;
  const clean=(name||'').trim();
  if(!/^[A-Za-z0-9_]{3,20}$/.test(clean)){
    showToast('❌ 3 à 20 caractères, lettres/chiffres/underscore uniquement');
    return;
  }
  if(containsBlockedWord(clean)){
    showToast('❌ Ce pseudo contient un mot interdit. Choisis-en un autre.');
    return;
  }
  try{
    const { error } = await sb.from('player_meta').update({ username:clean }).eq('user_id',session.user.id);
    if(error){
      if(error.code==='23505'){ showToast('❌ Ce pseudo est déjà pris !'); return; }
      throw error;
    }
    try{ await sb.from('profiles').upsert({ user_id:session.user.id, username:clean }); }catch(pe){ console.error('profiles upsert',pe); }
    meta.username=clean;
    showToast('✅ Pseudo défini : '+clean);
    screen='account'; render();
  }catch(e){ showToast('❌ Erreur: '+(e?.message||e)); }
}

const UPGRADE_MAX=20;
const POINTS_PER_LEVEL=3;
function upgradeCost(level){ return 20+level*20; }
let upgradeAlloc=null; // {rockId, add:{atk,def,vit}, pool, cost, level}
function startUpgrade(rockId){
  const rock=dex.find(r=>r.id===rockId);
  if(!rock||!session) return;
  const level=rock.upgradeLevel||0;
  if(level>=UPGRADE_MAX){ showToast('Niveau maximum atteint — fais-le évoluer !'); return; }
  const cost=upgradeCost(level);
  if((meta.gems||0)<cost){ showToast('❌ Pas assez de Gemmes !'); return; }
  upgradeAlloc={rockId, add:{atk:0,def:0,vit:0}, pool:POINTS_PER_LEVEL, cost, level:level+1};
  render();
}
function allocPoint(stat,delta){
  if(!upgradeAlloc) return;
  const rock=dex.find(r=>r.id===upgradeAlloc.rockId); if(!rock) return;
  if(delta>0){
    if(upgradeAlloc.pool<=0) return;
    if((rock[stat]+upgradeAlloc.add[stat])>=STAT_CAP){ showToast('Stat au maximum ('+STAT_CAP+')'); return; }
    upgradeAlloc.add[stat]++; upgradeAlloc.pool--;
  } else {
    if(upgradeAlloc.add[stat]<=0) return;
    upgradeAlloc.add[stat]--; upgradeAlloc.pool++;
  }
  render();
}
function cancelUpgrade(){ upgradeAlloc=null; render(); }
async function confirmUpgrade(){
  if(!upgradeAlloc) return;
  if(upgradeAlloc.pool>0){ showToast('Répartis tous tes points d\'abord !'); return; }
  const rock=dex.find(r=>r.id===upgradeAlloc.rockId);
  if(!rock||!session){ upgradeAlloc=null; render(); return; }
  const cost=upgradeAlloc.cost;
  if((meta.gems||0)<cost){ showToast('❌ Pas assez de Gemmes !'); upgradeAlloc=null; render(); return; }
  const a={...upgradeAlloc.add}, newLevel=upgradeAlloc.level;
  const updates={
    upgradeLevel:newLevel,
    atk:Math.min(STAT_CAP,rock.atk+a.atk), def:Math.min(STAT_CAP,rock.def+a.def), vit:Math.min(STAT_CAP,rock.vit+a.vit),
  };
  incrementStat('gems',-cost);
  try{
    const { error } = await sb.from('rocks').update({ upgrade_level:updates.upgradeLevel, atk:updates.atk, def:updates.def, vit:updates.vit }).eq('id',rock.id).eq('user_id',session.user.id);
    if(error) throw error;
    Object.assign(rock,updates); saveMeta(); detailRock=rock;
    const parts=[]; if(a.atk)parts.push('+'+a.atk+' ⚔️'); if(a.def)parts.push('+'+a.def+' 🛡️'); if(a.vit)parts.push('+'+a.vit+' 💨');
    upgradeAlloc=null;
    showToast(`⬆️ Niveau ${newLevel}/${UPGRADE_MAX} ! ${parts.join('  ')}`);
    if(navigator.vibrate) navigator.vibrate(30);
    render();
  }catch(e){ incrementStat('gems',cost); showToast('❌ Erreur: '+(e?.message||e)); }
}
async function evolveRock(rockId){
  const rock=dex.find(r=>r.id===rockId);
  if(!rock||!session) return;
  if((rock.upgradeLevel||0)<UPGRADE_MAX){ showToast('Le caillou doit être amélioré au maximum avant d\'évoluer.'); return; }
  if(rock.evolved){ showToast('Déjà évolué !'); return; }
  const cost=300;

function xpForLevel(n){ return 100+(n-1)*40; }
function getLevelInfo(totalXp){
  totalXp=totalXp||0;
  let level=1, used=0, needed=xpForLevel(level);
  while(used+needed<=totalXp){ used+=needed; level++; needed=xpForLevel(level); }
  return { level, xpIntoLevel:totalXp-used, xpForNext:needed };
}
function getLevelTitle(level){
  let title=LEVEL_TITLES[0].title;
  for(const t of LEVEL_TITLES){ if(level>=t.min) title=t.title; else break; }
  return title;
}
function checkAndUnlockBadges(){
  const already=new Set(meta.badges||[]);
  const checks={
    first:d=>d.length>=1, five:d=>d.length>=5, ten:d=>d.length>=10,
    twenty5:d=>d.length>=25, fifty:d=>d.length>=50,
    rare3:d=>d.filter(r=>r.rarity!=='commun').length>=3,
    epic1:d=>d.some(r=>r.rarity==='epique'||r.rarity==='legendaire'),
    epic5:d=>d.filter(r=>r.rarity==='epique'||r.rarity==='legendaire').length>=5,
    legend1:d=>d.some(r=>r.rarity==='legendaire'),
    streak3:(_,m)=>m.streak>=3, streak7:(_,m)=>m.streak>=7, streak30:(_,m)=>m.streak>=30,
    ai_first:d=>d.some(r=>r.aiGenerated),
    ai_ten:d=>d.filter(r=>r.aiGenerated).length>=10,
    share1:(_,m)=>(m.shared||0)>=1,
    speed:d=>d.some(r=>r.vit>50),
    chaos:d=>d.some(r=>r.rockType==='chaos'),
    level5:(_,m)=>getLevelInfo(m.xp||0).level>=5,
    level10:(_,m)=>getLevelInfo(m.xp||0).level>=10,
    level20:(_,m)=>getLevelInfo(m.xp||0).level>=20,
    level30:(_,m)=>getLevelInfo(m.xp||0).level>=30,
    level50:(_,m)=>getLevelInfo(m.xp||0).level>=50,
    level100:(_,m)=>getLevelInfo(m.xp||0).level>=100,
  };
  const fresh=ACHIEVEMENTS.filter(a=>{
    if(already.has(a.id)) return false;
    try{ return checks[a.id] ? checks[a.id](dex,meta) : false; }catch(e){ return false; }
  });
  if(!fresh.length) return [];
  // Ajout ADDITIF — on n'écrase jamais les badges existants
  meta.badges=[...already, ...fresh.map(a=>a.id)];
  fresh.forEach((a,i)=>setTimeout(()=>showToast(a.icon+' Badge débloqué : '+a.label+'!'),700+i*1100));
  // Sauvegarde immédiate des badges sans passer par le debounce de saveMeta
  if(session&&sb) sb.from('player_meta').update({badges:meta.badges}).eq('user_id',session.user.id).then(()=>{});
  return fresh;
}

function addXp(amount){
  if(!amount) return;
  const before=getLevelInfo(meta.xp||0).level;
  incrementStat('xp',amount);
  const fresh=checkAndUnlockBadges();
  // XP bonus pour nouveaux badges — incrémentation directe SANS récursion pour éviter la cascade
  if(fresh.length) incrementStat('xp', fresh.length*25);
  const after=getLevelInfo(meta.xp).level;
  saveMeta();
  if(after>before){
    setTimeout(()=>{
      showToast(`🎉 NIVEAU ${after} ! ${getLevelTitle(after)}`);
      if(navigator.vibrate) navigator.vibrate([30,40,30,40,60]);
    },350);
  }
}

  }catch(e){ dex=[]; console.error('loadCloudData rocks',e); showToast('❌ Chargement du dex impossible: '+(e?.message||e)); }
  try{
    const { data:row, error } = await sb.from('player_meta').select('*').eq('user_id',session.user.id).maybeSingle();
    if(error) throw error;
    if(row){
      meta={ streak:row.streak||0, lastCaptureDate:row.last_capture_date, badges:row.badges||[],
        shared:row.shared||0, todayChallenge:row.today_challenge||null, challengeDate:row.challenge_date,
        challengeCompletedDate:row.challenge_completed_date||null,
        wins:row.wins||0, losses:row.losses||0, xp:row.xp||0,
        gravillons:row.gravillons||0, gems:row.gems||0, inventory:row.inventory||{}, food:row.food||{},
        luckyBoostUntil:row.lucky_boost_until||null, streakFreezeCount:row.streak_freeze_count||0,
        ownedFrames:row.owned_frames||[], equippedFrame:row.equipped_frame||null, customTitle:row.custom_title||null,
        username:row.username||null };
      // Auto-synchronise le pseudo dans la table publique "profiles" pour que les
      // amis puissent nous retrouver (les anciens comptes n'y avaient jamais été inscrits).
      if(meta.username){ try{ sb.from('profiles').upsert({ user_id:session.user.id, username:meta.username }).then(()=>{},()=>{}); }catch(e){} }
    } else { await saveMeta(); }
  }catch(e){ console.error('loadCloudData meta',e); }
}

// Remise a zero unique du compteur de generation IA pour les comptes existants
// (permet de regenerer les personnages avec le nouveau decor). Se fait une fois
// par appareil grace a un marqueur local.
async function maybeResetCharGen(){
  if(!session||!sb) return;
  const KEY='cdx_chargen_reset_v1';
  try{ if(localStorage.getItem(KEY)==='1') return; }catch(e){ return; }
  try{
    await sb.from('rocks').update({ char_gen_count:0 }).eq('user_id',session.user.id).neq('char_gen_count',0);
    dex.forEach(r=>{ r.charGenCount=0; });
    try{ localStorage.setItem(KEY,'1'); }catch(e){}
  }catch(e){ console.warn('reset chargen',e); }
}

// Remise à zéro unique des comptes existants (nouveau départ pour le lancement).
// Vide le Dex + toutes les monnaies/progression, MAIS conserve badges, victoires,
// défaites et pseudo. Marqueur stocké dans inventory.__reset1 → une seule fois par
// COMPTE (synchronisé entre appareils, ne re-vide pas une progression reconstruite).
async function maybeResetLaunch(){
  if(!session||!sb) return;
  if(meta.inventory && meta.inventory.__reset1) return;
  const hadData=(dex&&dex.length>0)||(meta.gravillons||0)>0||(meta.gems||0)>0||(meta.xp||0)>0;
  try{
    // 1. Supprimer tous les cailloux capturés
    const { error:delErr } = await sb.from('rocks').delete().eq('user_id',session.user.id);
    if(delErr) throw delErr;
    // 2. Remettre à zéro les colonnes de base (présentes dans le schéma d'origine) + poser le marqueur
    const { error:metaErr } = await sb.from('player_meta').update({
      gravillons:0, gems:0, xp:0, streak:0, last_capture_date:null, shared:0,
      today_challenge:null, challenge_date:null, challenge_completed_date:null,
      inventory:{__reset1:1}, food:{},
    }).eq('user_id',session.user.id);
    if(metaErr) throw metaErr;
  }catch(e){ console.error('maybeResetLaunch',e); return; } // marqueur non posé → réessaiera au prochain lancement
  // 3. Colonnes optionnelles (peuvent ne pas exister selon les migrations) — best-effort
  try{ await sb.from('player_meta').update({ streak_freeze_count:0, owned_frames:[], equipped_frame:null, custom_title:null, lucky_boost_until:null }).eq('user_id',session.user.id); }catch(e){}
  // 4. État local (on garde badges, wins, losses, username)
  dex=[];
  meta.gravillons=0; meta.gems=0; meta.xp=0; meta.streak=0; meta.lastCaptureDate=null; meta.shared=0;
  meta.todayChallenge=null; meta.challengeDate=null; meta.challengeCompletedDate=null;
  meta.inventory={__reset1:1}; meta.food={};
  meta.streakFreezeCount=0; meta.ownedFrames=[]; meta.equippedFrame=null; meta.customTitle=null; meta.luckyBoostUntil=null;
  if(hadData) setTimeout(()=>showToast('🧹 Nouveau départ ! Ton Dex a été remis à zéro (badges, victoires et défaites conservés).'),600);
}

async function migrateLocalDexIfNeeded(){
  if(!session||!sb) return;
  try{
    const { count, error:countErr } = await sb.from('rocks').select('id',{count:'exact',head:true}).eq('user_id',session.user.id);
    if(countErr) throw countErr;
    if(count>0) return;
    const localRaw=await Store.get('caillou-dex');
    if(!localRaw) return;
    const localDex=JSON.parse(localRaw);
    if(!Array.isArray(localDex)||!localDex.length) return;
    const { error } = await sb.from('rocks').insert(localDex.map(r=>rockToRow(r,session.user.id)));
    if(error) throw error;
    showToast(`✅ ${localDex.length} caillou(x) de ton ancien dex importé(s) !`);
  }catch(e){ console.error('migrateLocalDexIfNeeded',e); showToast('❌ Import impossible: '+(e?.message||e)); }
}

/* ===== ANIME ART GENERATION ===== */
async function createAnimeArt(dataUrl, rarityHex){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const W=512, H=512;
      const c = document.createElement('canvas');
      c.width=W; c.height=H;
      const ctx = c.getContext('2d');

      // Fond dramatique
      const bg = ctx.createRadialGradient(W/2,H/2,W*0.1,W/2,H/2,W*0.75);
      bg.addColorStop(0,'rgba(30,20,50,0.9)');
      bg.addColorStop(1,'rgba(5,5,20,1)');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

      // Speed lines manga
      ctx.save();
      for(let i=0;i<64;i++){
        const angle = (i/64)*Math.PI*2;
        const inner = W*0.32;
        const outer = W*(0.46+Math.random()*0.1);
        const w2 = 0.5+Math.random()*2.5;
        ctx.globalAlpha = 0.04+Math.random()*0.1;
        ctx.strokeStyle='#fff';
        ctx.lineWidth=w2;
        ctx.beginPath();
        ctx.moveTo(W/2+Math.cos(angle)*inner, H/2+Math.sin(angle)*inner);
        ctx.lineTo(W/2+Math.cos(angle+0.04)*outer, H/2+Math.sin(angle+0.04)*outer);
        ctx.stroke();
      }
      ctx.restore();

      // Image caillou (rendu naturel, sans sursaturation)
      ctx.save();
      const margin = W*0.1;
      ctx.drawImage(img, margin, margin, W-margin*2, H-margin*2);
      ctx.restore();

      // Glow aura autour du caillou
      const grd = ctx.createRadialGradient(W/2,H/2,W*0.22,W/2,H/2,W*0.48);
      grd.addColorStop(0,'rgba(0,0,0,0)');
      grd.addColorStop(0.7,'rgba(0,0,0,0)');
      grd.addColorStop(1, rarityHex+'88');
      ctx.fillStyle=grd;
      ctx.fillRect(0,0,W,H);

      // Sparkle stars
      const sparks=[
        [W*.08,H*.10],[W*.88,H*.12],[W*.05,H*.72],[W*.92,H*.78],
        [W*.12,H*.50],[W*.84,H*.42],[W*.50,H*.04],[W*.44,H*.93],
        [W*.22,H*.85],[W*.76,H*.18],[W*.35,H*.06],[W*.62,H*.95],
      ];
      sparks.forEach(([sx,sy])=>{
        const sz = 7+Math.random()*14;
        ctx.save();
        ctx.translate(sx,sy);
        ctx.rotate(Math.random()*Math.PI);
        ctx.fillStyle='#fff';
        ctx.globalAlpha=0.6+Math.random()*0.4;
        ctx.beginPath();
        for(let p=0;p<8;p++){
          const a=(p*Math.PI)/4;
          const r = p%2===0 ? sz : sz*0.25;
          if(p===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
          else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });

      // Border double
      ctx.save();
      ctx.strokeStyle=rarityHex;
      ctx.lineWidth=10;
      ctx.strokeRect(5,5,W-10,H-10);
      ctx.strokeStyle='rgba(255,255,255,0.6)';
      ctx.lineWidth=2;
      ctx.strokeRect(15,15,W-30,H-30);
      ctx.restore();

      resolve(c.toDataURL('image/jpeg',0.88));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(' '); let line='', lines=[];
  for(const w of words){
    const t=line+w+' ';
    if(ctx.measureText(t).width>maxW && line){ lines.push(line); line=w+' '; } else line=t;
  }
  lines.push(line);
  ctx.textAlign='center';
  lines.forEach((l,i)=>ctx.fillText(l.trim(),x,y+i*lh));
}

function animateStats(rock){

  const valEls=document.querySelectorAll('.tcard-stat-val');

// Poids de tirage par rareté : [commun, rare, épique, légendaire, mythique, cosmique, galaxie]
function getWeights(streak){
  if(streak>=7) return [40,30,18,9,2.4,0.5,0.1];
  if(streak>=3) return [50,27,15,6,1.5,0.4,0.1];

}
function rollRarity(streak){
  const w=getWeights(streak);
  if(meta.luckyBoostUntil&&new Date(meta.luckyBoostUntil).getTime()>Date.now()){
    w[0]=Math.max(15,w[0]-20); w[1]+=8; w[2]+=8; w[3]+=4; w[4]+=1.6; w[5]+=0.5; w[6]+=0.12;
  }
  const total=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<RARITY_TIERS.length;i++){ if(r<w[i]) return RARITY_TIERS[i]; r-=w[i]; }
  return RARITY_TIERS[0];
}
function pickAtLeast(minKey){
  const minIdx=RARITY_TIERS.findIndex(t=>t.key===minKey);
  const pool=RARITY_TIERS.slice(minIdx);
  const weights=pool.map((_,i)=>pool.length-i);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<pool.length;i++){ if(r<weights[i]) return pool[i]; r-=weights[i]; }
  return pool[0];
}
function rollStat([min,max]){ return Math.floor(min+Math.random()*(max-min)); }
// Stat calée sur la fourchette de rareté [min,max], inclinée par l'indice IA (1-99).
function tierStat(aiVal,[min,max]){
  const roll=min+Math.random()*(max-min);
  if(aiVal==null||isNaN(aiVal)) return Math.max(1,Math.round(roll));
  const a=Math.max(1,Math.min(99,Number(aiVal)));
  const mapped=min+(a/99)*(max-min);
  return Math.max(1,Math.min(STAT_CAP,Math.round(roll*0.5+mapped*0.5)));
}

// Détermine le type d'un caillou en repartant du choix thématique de l'IA, mais
// en rééquilibrant grâce aux indices (couleur/brillance) pour que les types rares
// dans la nature — surtout GLACE — restent atteignables (cailloux pâles/brillants).
function resolveRockType(ai){
  const aiKey=(ai&&ai.type&&ROCK_TYPES.find(t=>t.key===ai.type))?ai.type:null;
  const cc=ai&&ai.color_category||null;   // clair | sombre | autre
  const shiny=!!(ai&&ai.shiny);
  const w={feu:1,glace:1,ombre:1,lumiere:1,metal:1,nature:1,chaos:1,neutre:1};
  if(aiKey) w[aiKey]+=12;                 // le choix de l'IA reste le plus probable
  if(cc==='clair'){ w.glace+=7; w.lumiere+=4; w.metal+=1; }
  if(cc==='sombre'){ w.ombre+=7; w.metal+=2; w.chaos+=2; }
  if(cc==='autre'){ w.feu+=3; w.nature+=3; w.chaos+=2; w.neutre+=1; }
  if(shiny){ w.glace+=4; w.metal+=4; w.lumiere+=3; w.chaos+=2; }
  if(cc==='clair'&&shiny){ w.glace+=5; }  // pâle + brillant/cristallin = glace
  const keys=Object.keys(w); let tot=0; keys.forEach(k=>tot+=w[k]);
  let r=Math.random()*tot, chosen=keys[0];
  for(const k of keys){ if(r<w[k]){ chosen=k; break; } r-=w[k]; }
  return ROCK_TYPES.find(t=>t.key===chosen)||pickType();
}

function findRockById(id){ if(revealRock&&revealRock.id===id) return revealRock; return dex.find(r=>r.id===id); }
function getLocation(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      async(pos)=>{
        try{
          const {latitude,longitude}=pos.coords;
          const res=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=fr`);
          const data=await res.json();
          resolve(data.city||data.locality||data.principalSubdivision||null);
        }catch(e){ resolve(null); }
      },
      ()=>resolve(null),{timeout:4000,maximumAge:600000}
    );
  });
}
function resizeImage(file,maxSize=800){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h){ if(w>maxSize){ h=Math.round(h*maxSize/w); w=maxSize; } }
        else { if(h>maxSize){ w=Math.round(w*maxSize/h); h=maxSize; } }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d');
        ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
        ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',.85));
      };
      img.onerror=()=>reject(new Error('img'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('file'));
    reader.readAsDataURL(file);
  });
}

let nsfwModel=null,nsfwModelPromise=null;

function loadNsfwModel(){

function moderateImage(dataUrl){
  return new Promise(async(resolve)=>{
    await loadNsfwModel();
    if(!nsfwModel){ resolve({safe:true}); return; }
    const img=new Image();
    img.onload=async()=>{
      try{
        const preds=await nsfwModel.classify(img);
        const hit=preds.find(p=>(p.className==='Porn'&&p.probability>.65)||(p.className==='Hentai'&&p.probability>.65));

  });

function doSplash(tier){
  // Les ondes concentriques en relief de la SURFACE sont rendues par le shader WebGL.
  // Ici on ajoute l'éclaboussure 3D qui jaillit AU-DESSUS de l'eau :
  // dôme d'écume + gerbe centrale + goutte au sommet + couronne de gouttelettes.
  const layer=document.getElementById('spSplashLayer'); if(!layer) return;
  const sc=1+tier*0.22;
  const dome=document.createElement('div'); dome.className='sp-dome'; dome.style.setProperty('--sc',sc.toFixed(2)); layer.appendChild(dome);
  const jet=document.createElement('div'); jet.className='sp-jet'; jet.style.setProperty('--sc',sc.toFixed(2)); layer.appendChild(jet);
  const bead=document.createElement('div'); bead.className='sp-bead'; bead.style.setProperty('--sc',sc.toFixed(2)); layer.appendChild(bead);
  const drops=10+tier*4;
  for(let i=0;i<drops;i++){ const d=document.createElement('div'); d.className='sp-drop'; const ang=-90+(Math.random()*140-70); const dist=(44+Math.random()*84)*sc;
    d.style.setProperty('--dx',(Math.cos(ang*Math.PI/180)*dist).toFixed(0)+'px'); d.style.setProperty('--dy',(-Math.abs(Math.sin(ang*Math.PI/180))*dist*1.2-18).toFixed(0)+'px'); d.style.animationDelay=(Math.random()*0.1).toFixed(2)+'s'; layer.appendChild(d); }
  setTimeout(()=>{ if(layer) layer.innerHTML=''; },1400);
}
function dropRock(){
  if(splashPhase==='dropping'||!splashRock) return;
  const rock=document.getElementById('spRock'), scene=document.getElementById('splashScene'), res=document.getElementById('spResult'), layer=document.getElementById('spSplashLayer');
  if(!rock||!scene) return;
  rock.classList.remove('sp-falling','sp-hidden'); if(layer) layer.innerHTML=''; if(res){ res.classList.remove('show'); res.textContent=''; }
  void rock.offsetWidth;
  splashPhase='dropping';
  const btn=document.getElementById('spDropBtn'); if(btn){ btn.disabled=true; btn.style.opacity='.5'; }
  rock.classList.add('sp-falling');
  const tier=splashTierOf(splashRock);
  setTimeout(()=>{
    if(!document.getElementById('splashScene')){ splashPhase='idle'; return; }
    doSplash(tier);
    if(splashWater){ splashWater.impactStart=performance.now(); splashWater.impactX=0.5; splashWater.impactAmp=1.0+tier*0.16; }
    if(navigator.vibrate) navigator.vibrate(tier>=3?[15,25,45]:15);
    if(tier>=3){ scene.classList.add('arena-shake'); setTimeout(()=>scene.classList.remove('arena-shake'),400); }
    rock.classList.add('sp-hidden');
    let isRecord=false; if(tier>getSplashRecord()){ setSplashRecord(tier); isRecord=true; }
    if(res){ res.textContent=(isRecord?'🏆 RECORD ! ':'')+SPLASH_TIERS[tier].label; res.classList.add('show'); }
    splashPhase='done';
    setTimeout(()=>{
      const b=document.getElementById('spDropBtn'); if(b){ b.disabled=false; b.style.opacity=''; b.textContent='🔁 RELANCER'; }
      const rk=document.getElementById('spRock'); if(rk) rk.classList.remove('sp-hidden','sp-falling');
      splashPhase='idle';
    },1500);
  },1250);
}
/* ===== Eau WebGL du Plouf (shader) — repli sur l'eau CSS si indisponible ===== */
let splashWater=null;
const SPLASH_WATER_FS=`precision highp float;
uniform vec2 uRes; uniform float uTime; uniform float uImpactT; uniform float uImpactX; uniform float uImpactAmp;
float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0)); vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
float fbm(vec2 p){ float s=0.0,a=0.5; for(int i=0;i<3;i++){ s+=a*noise(p); p*=2.03; a*=0.5; } return s; }
float H(vec2 p){
  float h=sin(p.y*3.4+uTime*1.4);
  h+=0.5*sin(p.y*7.0-uTime*2.1+p.x*2.4);
  h+=0.75*(fbm(p*1.7+vec2(0.0,uTime*0.55))-0.5);
  return h;
}
void main(){
  vec2 uv=gl_FragCoord.xy/uRes.xy;
  float y=1.0-uv.y;
  float persp=1.0/(y+0.11);
  vec2 wp=vec2((uv.x-0.5)*persp*1.1, persp*1.2);
  float h=H(wp);
  float dh=(h-H(wp+vec2(0.0,0.03)));
  /* --- Plouf : train de vagues concentriques en relief à l'impact --- */
  float foam=0.0;
  if(uImpactT>=0.0){
    float amp0=max(uImpactAmp,0.5);
    float iy=0.16; float ip=1.0/(iy+0.11);
    vec2 iwp=vec2((uImpactX-0.5)*ip*1.1, ip*1.2);
    float d=distance(wp,iwp);
    float t=uImpactT;
    float R=t*3.6*amp0;                             /* rayon de la vague de tête */
    float fade=smoothstep(3.4,0.0,t);
    float inside=smoothstep(0.0,0.45,R-d);          /* anneaux uniquement dans le cercle en expansion */
    float rings=sin(d*6.5 - t*11.5);                /* plusieurs ondes concentriques */
    float damp=exp(-max(R-d,0.0)*0.5);              /* les ondes arrière plus faibles */
    float amp=rings*inside*damp*fade;
    h += amp*1.9*amp0;                              /* soulève la surface -> capte ciel/soleil */
    dh += amp*2.6*amp0;                             /* crêtes éclairées / creux ombrés (relief 3D) */
    float lead=smoothstep(0.42,0.0,abs(R-d))*fade;  /* écume sur le front de la vague */
    float center=smoothstep(0.6,0.0,d)*smoothstep(0.0,0.2,t)*smoothstep(1.5,0.0,t);
    foam=max(lead,center);
  }
  /* --- couleur de base + profondeur --- */
  vec3 top=vec3(0.28,0.60,0.76), deep=vec3(0.02,0.15,0.33);
  vec3 col=mix(top,deep,smoothstep(0.0,1.0,y));
  col+=vec3(0.42,0.70,0.84)*clamp(dh*2.4,0.0,1.0)*0.62;
  col-=0.11*clamp(-dh*2.1,0.0,1.0);
  float crest=smoothstep(0.80,1.2,h);
  col+=vec3(0.82,0.93,1.0)*crest*0.5;
  /* --- reflet du ciel (surface glossy, comme un miroir) --- */
  vec3 skyCol=vec3(0.74,0.87,0.98);
  float skyMix=pow(1.0-clamp(y,0.0,1.0),2.2)*0.78 + crest*0.22;
  col=mix(col,skyCol,clamp(skyMix,0.0,0.9));
  /* --- reflet du soleil (halo chaud sous le soleil, près de l'horizon) --- */
  float sunX=0.74;
  float sunGlow=smoothstep(0.17,0.0,abs(uv.x-sunX))*smoothstep(0.60,0.0,y);
  col+=vec3(1.0,0.85,0.52)*sunGlow*0.55;
  /* --- chemin scintillant du soleil --- */
  float w=0.05+y*0.30;
  float column=smoothstep(w,0.0,abs(uv.x-sunX));
  float spk=fbm(wp*3.8+vec2(uTime*0.4,uTime*2.7));
  float sparkle=smoothstep(0.50,0.85,spk);
  float glit=column*(sparkle*(0.5+abs(dh)*7.5)+0.10);
  col+=vec3(1.0,0.87,0.55)*glit*1.4;
  /* --- écume de l'impact --- */
  col+=vec3(0.95,0.98,1.0)*foam*0.95;
  col+=vec3(0.92,0.97,1.0)*smoothstep(0.04,0.0,y)*0.7;
  gl_FragColor=vec4(col,1.0);
}`;
function stopSplashWater(){
  if(!splashWater) return;
  try{ cancelAnimationFrame(splashWater.raf); }catch(e){}
  try{ const l=splashWater.gl.getExtension('WEBGL_lose_context'); if(l) l.loseContext(); }catch(e){}
  splashWater=null;
}
function startSplashWater(){
  if(screen!=='splash'||splashWater) return;
  const cv=document.getElementById('spWaterGl'); if(!cv) return;
  let gl=null; try{ gl=cv.getContext('webgl')||cv.getContext('experimental-webgl'); }catch(e){}
  if(!gl){ cv.style.display='none'; return; }
  function mkSh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o); return gl.getShaderParameter(o,gl.COMPILE_STATUS)?o:null; }
  const vs=mkSh(gl.VERTEX_SHADER,'attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}');
  const fs=mkSh(gl.FRAGMENT_SHADER,SPLASH_WATER_FS);
  if(!vs||!fs){ cv.style.display='none'; return; }
  const pr=gl.createProgram(); gl.attachShader(pr,vs); gl.attachShader(pr,fs); gl.linkProgram(pr);
  if(!gl.getProgramParameter(pr,gl.LINK_STATUS)){ cv.style.display='none'; return; }
  gl.useProgram(pr);
  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const lp=gl.getAttribLocation(pr,'p'); gl.enableVertexAttribArray(lp); gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
  const uRes=gl.getUniformLocation(pr,'uRes'), uTime=gl.getUniformLocation(pr,'uTime');
  const uImpactT=gl.getUniformLocation(pr,'uImpactT'), uImpactX=gl.getUniformLocation(pr,'uImpactX'), uImpactAmp=gl.getUniformLocation(pr,'uImpactAmp');
  const st={gl:gl,raf:0,start:performance.now(),cv:cv,uRes:uRes,uTime:uTime,w:0,h:0,impactStart:0,impactX:0.5,impactAmp:1.0};
  splashWater=st;
  function frame(){
    if(splashWater!==st||!document.getElementById('spWaterGl')) return;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const w=Math.max(1,Math.round(cv.clientWidth*dpr)), h=Math.max(1,Math.round(cv.clientHeight*dpr));
    if(w!==st.w||h!==st.h){ cv.width=w; cv.height=h; st.w=w; st.h=h; gl.viewport(0,0,w,h); }
    gl.uniform2f(uRes,st.w,st.h);
    gl.uniform1f(uTime,(performance.now()-st.start)/1000);
    let it=-1.0;
    if(st.impactStart){ const dt=(performance.now()-st.impactStart)/1000; if(dt<3.4) it=dt; else st.impactStart=0; }
    gl.uniform1f(uImpactT,it);
    gl.uniform1f(uImpactX,st.impactX);
    gl.uniform1f(uImpactAmp,st.impactAmp);
    gl.drawArrays(gl.TRIANGLES,0,3);
    st.raf=requestAnimationFrame(frame);
  }
  st.raf=requestAnimationFrame(frame);
}

}

function rockAttacks(r){
  const typeInfo=ROCK_TYPES.find(t=>t.key===r.rockType);
  const atk=r.atk||10;
  // Nom de l'attaque speciale sans la longue parenthese (qui sert de description).
  const sm=(r.specialMove||'Coup Spécial').trim();
  const smName=sm.split('(')[0].trim();
  const smParen=(sm.match(/\(([^)]*)\)/)||[])[1];
  return [
    { name: typeInfo?typeInfo.label:'⬜ FRAPPE', pow: atk,
      desc: typeInfo?typeInfo.desc:'Un bon vieux coup de caillou brut.' },
    { name: '⚡ '+smName, pow: Math.round(atk*1.6),
      desc: smParen || r.quip || r.personality || 'Une attaque spéciale imprévisible et dévastatrice.' },
  ];
}

function badgesScreen(){
  const unlocked=new Set(meta.badges||[]);
  const total=ACHIEVEMENTS.length;
  const done=ACHIEVEMENTS.filter(a=>unlocked.has(a.id)).length;
  let i=0;
  const sections=BADGE_TIER_ORDER.map(tierKey=>{
    const tier=BADGE_TIERS[tierKey];
    const items=ACHIEVEMENTS.filter(a=>a.tier===tierKey);
    if(!items.length) return '';
    const tierDone=items.filter(a=>unlocked.has(a.id)).length;
    const cards=items.map(a=>{
      const on=unlocked.has(a.id);
      const html=`<div class="badge-card fadeup" style="animation-delay:${i*45}ms;border-color:${on?tier.color+'55':'rgba(255,255,255,.1)'};">
        <div class="badge-medal ${on?'on':'off'}" style="${on?`background:linear-gradient(135deg,${tier.color},${tier.color}AA);border-color:${tier.color};box-shadow:0 0 12px ${tier.color}66;`:''}">${on?a.icon:'🔒'}</div>
        <div><div class="badge-title" style="color:${on?'#fff':'rgba(255,255,255,.35)'};">${a.label}</div><div class="badge-desc">${a.desc}</div></div>
      </div>`;
      i++;
      return html;
    }).join('');
    return `<div class="badge-tier-header" style="color:${tier.color};border-color:${tier.color}40;">${tier.label}<span style="opacity:.55;font-weight:700;">${tierDone}/${items.length}</span></div>${cards}`;
  }).join('');
  return `<div>
    <div style="font-family:'Baloo 2',sans-serif;font-weight:700;font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:14px;letter-spacing:.06em;">${done}/${total} BADGES DÉBLOQUÉS</div>
    ${sections}
  </div>`;
}

async function adminSearchPlayer(q){

function genRoomCode(){
  const chars='23456789ABCDEFGHJKMNPQRSTUVWXYZ';
  let code='';
  for(let i=0;i<6;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

// Config WebRTC : STUN + TURN (indispensable pour connecter 2 telephones
// sur des reseaux differents ; sans TURN la connexion directe echoue souvent).
// Les identifiants TURN fiables sont recuperes au besoin depuis metered.
let ICE_SERVERS=[
  { urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302'] },
];
let _iceLoaded=false, _iceStatus='non tenté';
async function loadIceServers(){
  if(_iceLoaded) return;
  try{
    const res=await fetch('https://cailloudex.metered.live/api/v1/turn/credentials?apiKey=ttbeidI02RYa3Ah9wotie9-Fhrlbtb7bWxP6JVzRBXO0MHDT',{signal:AbortSignal.timeout(6000)});
    if(!res.ok){ _iceStatus='HTTP '+res.status; return; }
    const data=await res.json();
    const list=Array.isArray(data)?data:(data&&Array.isArray(data.iceServers)?data.iceServers:null);
    if(list&&list.length){ ICE_SERVERS=list; _iceLoaded=true; _iceStatus='ok'; }
    else{ _iceStatus='format inattendu'; }
  }catch(e){ _iceStatus='échec fetch'; console.warn('TURN metered indisponible, STUN seul:',e); }
}
function getPeerConfig(){ return { debug:0, config:{ iceServers:ICE_SERVERS } }; }
function turnCount(){ try{ return ICE_SERVERS.filter(s=>{const u=s.urls;const j=Array.isArray(u)?u.join(','):(u||'');return j.indexOf('turn')>=0;}).length; }catch(e){ return 0; } }
function onlineDiagLine(){
  if(!onlineState||!onlineState.diag) return '';
  // Etape en cours, en clair (le detail technique reste dans la console).
  const friendly=String(onlineState.diag).replace(/^[①②③④⑤]\s*/,'');
  return `<p style="font-family:'Nunito',sans-serif;font-size:11px;color:rgba(255,255,255,.4);margin-top:14px;">${friendly}</p>`;
}
function attachIceDiag(conn){
  let tries=0;
  const tryAttach=()=>{
    let pc=null; try{ pc=conn&&conn.peerConnection; }catch(e){}
    if(pc){
      const upd=()=>{ if(onlineState){ onlineState.iceState=pc.iceConnectionState; if(screen==='online-wait') render(); } };
      try{ pc.addEventListener('iceconnectionstatechange',upd); }catch(e){}
      upd(); return;
    }
    if(tries++<25) setTimeout(tryAttach,300);
  };
  tryAttach();
}

function loadPeerJS(){
  return new Promise((res,rej)=>{
    if(window.Peer){res();return;}
    const s=document.createElement('script');
    s.src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
    s.onload=res; s.onerror=()=>rej(new Error('PeerJS indisponible'));
    document.head.appendChild(s);
  });
}

function cancelOnline(){
  if(onlineState){
    clearTimeout(onlineState.botTimer);
    clearInterval(onlineState.cdTimer);
    clearTimeout(onlineState.connTimeout);
    try{ if(onlineState.conn) onlineState.conn.close(); }catch(e){}
    try{ if(onlineState.peer) onlineState.peer.destroy(); }catch(e){}
    onlineState=null;
  }
  battleState=null; screen='online-menu'; render();
}

function onlineConnReady(){
  if(!onlineState||!onlineState.conn) return;
  onlineState.conn.send({type:'hello',v:1});
}

function setupOnlineConn(conn){
  onlineState.conn=conn;
  if(onlineState){ onlineState.diag='③ Négociation réseau (WebRTC)…'; if(screen==='online-wait') render(); }
  attachIceDiag(conn);
  if(conn.open){ onlineConnReady(); }
  else { conn.on('open',()=>{ if(onlineState){ onlineState.diag='④ Canal ouvert ✅'; } onlineConnReady(); }); }
  conn.on('data',handleOnlineMsg);
  conn.on('close',()=>{
    if(!battleState||battleState.turn==='end') return;
    showToast('❌ Connexion perdue !');
    cancelOnline();
  });
  conn.on('error',()=>showToast('Erreur réseau'));
}

function handleOnlineMsg(msg){
  if(!msg||!onlineState) return;
  if(msg.type==='hello'){
    clearTimeout(onlineState.botTimer);
    clearInterval(onlineState.cdTimer);
    clearTimeout(onlineState.connTimeout);
    showToast('🎉 Adversaire connecté ! Choisis ton caillou.');
    screen='online-pick'; render();
  }
  if(msg.type==='rock-pick'){
    onlineState.opponentRock=msg.rock;
    if(onlineState.myRock) startOnlineBattle();
    else showToast('Adversaire a choisi. Fais vite !');
  }
  if(msg.type==='rock-media'){
    // Images de l'adversaire recues separement (le combat a deja pu demarrer).
    if(onlineState.opponentRock){
      if(msg.photo) onlineState.opponentRock.photo=msg.photo;
      if(msg.characterPhoto) onlineState.opponentRock.characterPhoto=msg.characterPhoto;
    }
    if(battleState&&battleState.botRock){
      if(msg.characterPhoto) battleState.botRock.characterPhoto=msg.characterPhoto;
      if(msg.photo){
        battleState.botRock.photo=msg.photo;
        makeRockSprite(msg.photo,battleState.botRock.name||'opponent').then(url=>{ if(battleState){ battleState.botSpriteUrl=url; render(); } });
      } else render();
    }
  }
  if(msg.type==='rematch-request'){
    if(onlineState){ onlineState.rematchIncoming=true; if(navigator.vibrate) navigator.vibrate([60,50,60]); if(screen==='combat-result') render(); else showToast('🔄 Ton adversaire veut une revanche !'); }
  }
  if(msg.type==='rematch-accept'){ startRematch(); }
  if(msg.type==='rematch-decline'){
    if(onlineState) onlineState.rematchRequested=false;
    showToast('❌ Revanche refusée par ton adversaire');
    if(screen==='combat-result') render();
  }
  if(msg.type==='action') applyOnlineOpponentAction(msg);
}

async function createOnlineSalle(){
  try{ showToast('Chargement réseau...'); await loadPeerJS(); }
  catch(e){ showToast('❌ Module réseau indisponible'); return; }
  await loadIceServers();
  const code=genRoomCode();
  onlineState={ isHost:true, roomCode:code, peer:null, conn:null,
    myRock:null, opponentRock:null, cd:30, botTimer:null, cdTimer:null };
  screen='online-wait'; render();
  const peer=new Peer(code,getPeerConfig());
  onlineState.peer=peer;
  peer.on('open',()=>{
    onlineState.cdTimer=setInterval(()=>{
      onlineState.cd--;
      if(screen==='online-wait') render();
      if(onlineState.cd<=0){
        clearInterval(onlineState.cdTimer);
        showToast('⏱️ Personne... un bot prend la relève !');
        try{ peer.destroy(); }catch(e){}
        onlineState=null; screen='combat-pick'; render();
      }
    },1000);
  });
  peer.on('connection',conn=>{
    clearInterval(onlineState.cdTimer);
    setupOnlineConn(conn);
  });
  peer.on('error',e=>{ showToast('Erreur: '+e.type); cancelOnline(); });
}

async function sendChallenge(friendId,friendUsername){
  if(!session||!sb) return;
  try{ await loadPeerJS(); }
  catch(e){ showToast('❌ Module réseau indisponible'); return; }
  await loadIceServers();
  const code=genRoomCode();
  try{
    const { error } = await sb.from('challenges').insert({
      challenger_id:session.user.id, challenger_username:meta.username||'Joueur',
      target_id:friendId, room_code:code, status:'pending',
    });
    if(error) throw error;
  }catch(e){ showToast('❌ Erreur: '+(e?.message||e)); return; }
  showToast(`⚔️ Défi envoyé à ${friendUsername} !`);
  onlineState={ isHost:true, isChallenge:true, targetUsername:friendUsername, roomCode:code,
    peer:null, conn:null, myRock:null, opponentRock:null, cd:0, botTimer:null, cdTimer:null };
  screen='online-wait'; render();
  const peer=new Peer(code,getPeerConfig());
  onlineState.peer=peer;
  peer.on('connection',conn=>{ setupOnlineConn(conn); });
  peer.on('error',e=>{ showToast('Erreur: '+e.type); cancelOnline(); });
}

async function joinOnlineSalle(code){
  try{ await loadPeerJS(); }
  catch(e){ showToast('❌ Module réseau indisponible'); return; }
  await loadIceServers();
  onlineState={ isHost:false, roomCode:code, peer:null, conn:null, diag:'① Recherche du serveur…',
    myRock:null, opponentRock:null, cd:0, botTimer:null, cdTimer:null };
  screen='online-wait'; render();
  const peer=new Peer(getPeerConfig());
  onlineState.peer=peer;
  peer.on('open',()=>{
    if(onlineState){ onlineState.diag='② Connexion à l\'adversaire…'; if(screen==='online-wait') render(); }
    const conn=peer.connect(code,{reliable:true,serialization:'json'});
    setupOnlineConn(conn);
    // Filet de securite : si la connexion n'aboutit pas (reseau bloquant),
    // on ne reste pas bloque a l'attente indefiniment.
    onlineState.connTimeout=setTimeout(()=>{
      if(onlineState&&!battleState&&screen==='online-wait'){
        showToast('❌ Connexion impossible (réseau). Réessaie ou passe en Wi-Fi.');
        cancelOnline();
      }
    },20000);
  });
  peer.on('error',e=>{
    if(onlineState){ onlineState.diag='⚠️ Erreur: '+e.type; }
    showToast(e.type==='peer-unavailable'?'❌ Salle introuvable':'Erreur: '+e.type);
    if(e.type==='peer-unavailable') cancelOnline();
    else if(screen==='online-wait') render();
  });
}

function shrinkForNetwork(dataUrl,maxSize=160,quality=0.55){
  return new Promise(resolve=>{
    if(!dataUrl){ resolve(null); return; }
    const img=new Image();
    img.onload=()=>{
      try{
        let w=img.width,h=img.height;
        if(w>h){ if(w>maxSize){ h=Math.round(h*maxSize/w); w=maxSize; } }
        else { if(h>maxSize){ w=Math.round(w*maxSize/h); h=maxSize; } }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      }catch(e){ resolve(null); }
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}

  if(!onlineState||onlineState.myRock) return;

  if((meta.inventory?.mighty||0)>0){
    meta.inventory.mighty--; saveMeta();
    effRock={...rock, atk:Math.round(rock.atk*1.2), def:Math.round(rock.def*1.2)};
    setTimeout(()=>showToast('💪 Caillou Costaud activé !'),250);
  }
  onlineState.myRock=effRock;
  render();
  // 1) On envoie d'ABORD uniquement les stats (message minuscule) : le combat
  //    se lance de facon fiable meme sur Safari/iPhone, sans dependre des images
  //    (un gros message WebRTC pouvait echouer en silence et tout bloquer).
  const stats={name:effRock.name,atk:effRock.atk,def:effRock.def,vit:effRock.vit,
    specialMove:effRock.specialMove,rarityLabel:effRock.rarityLabel,hex:effRock.hex,
    rarity:effRock.rarity,rockType:effRock.rockType,emoji:'⬜'};
  try{ onlineState.conn.send({type:'rock-pick',rock:stats}); }catch(e){}
  if(onlineState.opponentRock) startOnlineBattle();

  // 2) Puis les images, en petit et separement (best-effort ; le duel n'en depend pas).
  try{
    const [smallPhoto,smallChar]=await Promise.all([
      shrinkForNetwork(effRock.photo,128,0.5),
      shrinkForNetwork(effRock.characterPhoto||null,128,0.55),
    ]);
    if(onlineState&&onlineState.conn) onlineState.conn.send({type:'rock-media',photo:smallPhoto||null,characterPhoto:smallChar||null});

}

async function playerOnlineAction(moveId){
  if(!battleState||battleState.turn!=='player') return;
  if(moveId==='flee'){
    try{ onlineState.conn.send({type:'action',action:'flee',dmg:0}); }catch(e){}
    showToast('🏃 Tu fuis sans gloire...');
    incrementStat('losses',1);
    battleState.winner='bot'; battleState.turn='end';
    screen='combat-result'; render(); return;
  }
  if(moveId==='feed'){
    const result=consumeFoodHeal(true);
    if(!result){ showToast('Tu n\'as pas de nourriture !'); return; }
    try{ onlineState.conn.send({type:'action',action:'feed',foodName:result.food.name,foodEmoji:result.food.emoji,healAmt:result.healAmt}); }catch(e){}
    addCombatLog(`${result.food.emoji} ${battleState.playerRock.name} mange : ${result.food.name} (+${result.healAmt} PV) !`,'neutral');
    battleState.turn='opponent'; render();
    return;
  }
  const moves=getAvailableMoves(battleState.playerRock);
  const move=moves.find(m=>m.id===moveId);
  if(!move) return;
  if(move.onceOnly){
    const usedFlag=moveId==='special'?'playerSpecialUsed':'playerUltimateUsed';
    if(battleState[usedFlag]){ showToast('Déjà utilisée !'); return; }
  }
  battleState.turn='animating'; render();
  const tMult=move.isType?typeMultiplier(battleState.playerRock.rockType,battleState.botRock.rockType):1;
  const dmg=calcDmg(battleState.playerRock.atk,battleState.botRock.def,move.mult*tMult);
  await playAttackAnim('playerSprite','botSprite',{dmg,ultimate:moveId==='ultimate',effective:tMult>1?'super':tMult<1?'weak':null,color:attackColor(battleState.playerRock,moveId)});
  if(moveId==='special') battleState.playerSpecialUsed=true;
  if(moveId==='ultimate') battleState.playerUltimateUsed=true;
  battleState.botHP=Math.max(0,battleState.botHP-dmg);
  try{ onlineState.conn.send({type:'action',action:moveId,dmg}); }catch(e){}
  const typeTxt=move.isType?(tMult>1?' (super efficace !)':tMult<1?' (peu efficace...)':''):'';
  let msg;
  if(moveId==='ultimate') msg=`🌟 ULTIME ! ${battleState.playerRock.name} déchaîne sa puissance`;
  else if(moveId==='special') msg=`⚡ ${battleState.playerRock.name} : ${battleState.playerRock.specialMove||'Spéciale'}`;
  else if(moveId==='type') msg=`${move.label} ${battleState.playerRock.name} frappe`;
  else msg=`${battleState.playerRock.name} frappe`;
  addCombatLog(`${msg} : -${dmg} PV${typeTxt}`,'dmg-bot');
  if(battleState.botHP<=0){
    battleState.winner='player'; battleState.turn='end';
    incrementStat('wins',1);
    addXp(30); addGravillons(20); addGems(WIN_GEMS);
    grantFoodLoot();
    screen='combat-result'; render(); return;
  }
  battleState.turn='opponent'; render();
}

async function applyOnlineOpponentAction(msg){
  if(!battleState||battleState.turn!=='opponent') return;
  if(msg.action==='flee'){
    addCombatLog(`${battleState.botRock.name} prend ses jambes à son cou ! (enfin, façon de parler)`,'dmg-bot');
    battleState.winner='player'; battleState.turn='end';
    incrementStat('wins',1);
    addXp(30); addGravillons(20); addGems(WIN_GEMS);
    grantFoodLoot();
    screen='combat-result'; render(); return;
  }
  if(msg.action==='feed'){
    const healAmt=msg.healAmt||0;
    battleState.botHP=Math.min(battleState.botMaxHP,battleState.botHP+healAmt);
    addCombatLog(`${msg.foodEmoji||'🍖'} ${battleState.botRock.name} mange : ${msg.foodName||'un encas'} (+${healAmt} PV) !`,'neutral');
    battleState.turn='player'; render();
    return;
  }
  battleState.turn='animating'; render();
  const dmg=msg.dmg||0;
  await playAttackAnim('botSprite','playerSprite',{dmg,ultimate:msg.action==='ultimate',color:attackColor(battleState.botRock,msg.action)});
  battleState.playerHP=Math.max(0,battleState.playerHP-dmg);
  if(msg.action==='special'){
    battleState.botSpecialUsed=true;
    addCombatLog(`⚡ ${battleState.botRock.name} : ${battleState.botRock.specialMove||'Spéciale'} ! -${dmg} PV 💥`,'dmg-player');
  } else if(msg.action==='ultimate'){
    battleState.botUltimateUsed=true;
    addCombatLog(`🌟 ULTIME ! ${battleState.botRock.name} déchaîne sa puissance : -${dmg} PV 💥`,'dmg-player');
  } else if(msg.action==='type'){
    addCombatLog(`${battleState.botRock.name} frappe avec son type : -${dmg} PV`,'dmg-player');
  } else {
    addCombatLog(`${battleState.botRock.name} contre-attaque : -${dmg} PV.`,'dmg-player');
  }
  if(battleState.playerHP<=0){
    battleState.winner='bot'; battleState.turn='end';
    incrementStat('losses',1);
    screen='combat-result'; render(); return;
  }
  battleState.turn='player'; render();
}

/* ===== SPRITES DE COMBAT (découpe organique depuis la photo) ===== */
function hashStr(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))|0; return Math.abs(h)||1; }
function seededRandom(seed){
  let s=seed%2147483647; if(s<=0) s+=2147483646;
  return function(){ s=s*16807%2147483647; return (s-1)/2147483646; };
}
function rockBlobPath(ctx,cx,cy,baseR,seed){
  const rand=seededRandom(seed);
  const n=10+Math.floor(rand()*4);
  const pts=[];
  for(let i=0;i<n;i++){
    const angle=(i/n)*Math.PI*2;
    const r=baseR*(0.7+rand()*0.34);
    pts.push([cx+Math.cos(angle)*r,cy+Math.sin(angle)*r]);
  }
  const mid=(a,b)=>[(a[0]+b[0])/2,(a[1]+b[1])/2];
  ctx.beginPath();
  const m0=mid(pts[n-1],pts[0]);
  ctx.moveTo(m0[0],m0[1]);
  for(let i=0;i<n;i++){
    const next=pts[(i+1)%n];
    const m=mid(pts[i],next);
    ctx.quadraticCurveTo(pts[i][0],pts[i][1],m[0],m[1]);
  }
  ctx.closePath();
}
function makeRockSprite(photoDataUrl,seedStr){
  return new Promise(resolve=>{
    if(!photoDataUrl){ resolve(null); return; }
    const img=new Image();
    img.onload=()=>{
      try{
        const S=300;
        const c=document.createElement('canvas'); c.width=S; c.height=S;
        const ctx=c.getContext('2d');
        const seed=hashStr(String(seedStr||'rock'));
        ctx.save();
        rockBlobPath(ctx,S/2,S/2,S*0.43,seed);
        ctx.clip();
        const scale=Math.max(S/img.width,S/img.height)*1.15;
        const w=img.width*scale, h=img.height*scale;
        ctx.drawImage(img,S/2-w/2,S/2-h/2,w,h);
        const shade=ctx.createRadialGradient(S*0.36,S*0.30,S*0.04,S/2,S/2,S*0.48);
        shade.addColorStop(0,'rgba(255,255,255,0.22)');
        shade.addColorStop(0.55,'rgba(255,255,255,0)');
        shade.addColorStop(1,'rgba(0,0,0,0.38)');
        ctx.fillStyle=shade;
        ctx.fillRect(0,0,S,S);
        ctx.restore();
        resolve(c.toDataURL('image/png'));
      }catch(e){ resolve(null); }
    };
    img.onerror=()=>resolve(null);
    img.src=photoDataUrl;
  });
}
function attackColor(rock,moveId){
  if(moveId==='ultimate') return '#FFD700';
  if(moveId==='special') return '#C45CFF';
  const t=ROCK_TYPES.find(x=>x.key===(rock&&rock.rockType)); return t?t.color:'#F7DC6F';
}
function spawnHitFx(defenderId,opts={}){
  const el=document.getElementById(defenderId);
  const app=document.getElementById('app');
  const crit=!!opts.crit, big=crit||opts.ultimate;
  // Secousse de l'arène (appliquee a #app qui survit au re-render)
  if(app){ const cls=big?'arena-shake-hard':'arena-shake'; app.classList.remove('arena-shake','arena-shake-hard'); void app.offsetWidth; app.classList.add(cls); setTimeout(()=>app.classList.remove(cls),560); }
  if(navigator.vibrate) navigator.vibrate(big?[30,40,60]:35);
  // Flash blanc pour les gros coups
  if(big){ const fl=document.createElement('div'); fl.className='flash-white'; document.body.appendChild(fl); setTimeout(()=>fl.remove(),340); }
  if(!el) return;
  const card=el.closest('.bcard');
  if(card){ card.classList.remove('card-hurt'); void card.offsetWidth; card.classList.add('card-hurt'); setTimeout(()=>card.classList.remove('card-hurt'),520); }
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const color=opts.color||'#ffffff';
  const burst=document.createElement('div');
  burst.className='hitfx-burst'+(crit?' crit':'');
  burst.style.cssText=`left:${cx}px;top:${cy}px;`;
  burst.style.setProperty('--fxc',color);
  document.body.appendChild(burst); setTimeout(()=>burst.remove(),640);
  if(opts.dmg!=null){
    const num=document.createElement('div');
    const isHeal=!!opts.heal, isZero=opts.dmg===0;
    num.className='hitfx-num'+(crit?' crit':'')+(isHeal?' heal':'')+(isZero&&!isHeal?' zero':'');
    num.style.cssText=`left:${cx}px;top:${r.top+6}px;`;
    num.textContent=(isHeal?'+':isZero?'':'-')+opts.dmg+(isZero&&!isHeal?' 🛡️':opts.effective==='super'?' 🔥':'');
    document.body.appendChild(num); setTimeout(()=>num.remove(),1000);
  }
}
function playAttackAnim(attackerId,defenderId,opts={}){
  return new Promise(resolve=>{
    const atkEl=document.getElementById(attackerId);
    const defEl=document.getElementById(defenderId);
    if(atkEl) atkEl.classList.add('lunge');
    setTimeout(()=>{
      if(defEl) defEl.classList.add('hit-shake');
      spawnHitFx(defenderId,opts);
      resolve();
      setTimeout(()=>{
        if(atkEl) atkEl.classList.remove('lunge');
        if(defEl) defEl.classList.remove('hit-shake');
      },430);
    },260);
  });
}

      battleState.botRock.characterPhoto=BOT_CHARACTER_CACHE[key]; render();

  try{

      atk:botRock.atk||10, def:botRock.def||10, vit:botRock.vit||1, rarity:'commun',

function makeBotRock(){
  const base=BOT_POOL[Math.floor(Math.random()*BOT_POOL.length)];
  const tier=rollRarity(0);
  return Object.assign({},base,{
    rarity:tier.key, rarityLabel:tier.label, hex:tier.hex,
    atk:rollStat(tier.range), def:rollStat(tier.range), vit:rollStat([1,8]),
  });
}

function combatMaxHP(def){ return 120+def*7; }

function calcDmg(atkStat,defStat,multiplier=1){
  const raw=Math.max(1, atkStat - Math.floor(defStat/6) + Math.floor(Math.random()*16) - 8);
  return Math.max(1,Math.round(raw*multiplier));
}
function getAvailableMoves(rock){
  const typeInfo=ROCK_TYPES.find(t=>t.key===rock.rockType);
  const moves=[
    { id:'attack', label:'⚔️ ATTAQUE', mult:1 },
    { id:'type', label:typeInfo?typeInfo.label:'⬜ TYPE', mult:1, isType:true },
  ];
  if(rock.rarity!=='commun'){
    moves.push({ id:'special', label:'⚡ '+(rock.specialMove||'SPÉCIALE').split(' ').slice(0,3).join(' '), mult:1.6, onceOnly:true });
  }
  if(rock.rarity==='legendaire'||rock.evolved){
    moves.push({ id:'ultimate', label:'🌟 ULTIME', mult:2.3, onceOnly:true });
  }
  return moves;
}

/* ========= MOTEUR DE COMBAT PROFOND (solo vs bot) ========= */
const STATUS_DEFS={
  brulure:{icon:'🔥',name:'Brûlure',color:'#FF6B35',desc:'Perd des PV chaque tour'},
  gel:{icon:'❄️',name:'Gelé',color:'#74B9FF',desc:'Saute son prochain tour'},
  malediction:{icon:'🌑',name:'Malédiction',color:'#B57BE0',desc:'Attaques affaiblies'},
  aveugle:{icon:'✨',name:'Aveuglé',color:'#F7DC6F',desc:'Risque de rater'},
  blindage:{icon:'⚙️',name:'Blindage',color:'#AEB7C0',desc:'Dégâts subis réduits'},
  regen:{icon:'🌿',name:'Régén.',color:'#27AE60',desc:'Récupère des PV chaque tour'},
  confusion:{icon:'💫',name:'Confus',color:'#FF4081',desc:'Peut se blesser tout seul'},
};
// Statut infligé selon le type de l'attaque. self=true → s'applique à l'attaquant.
const TYPE_STATUS={
  feu:{kind:'brulure',turns:3},
  glace:{kind:'gel',turns:1},
  ombre:{kind:'malediction',turns:2},
  lumiere:{kind:'aveugle',turns:2},
  metal:{kind:'blindage',turns:2,self:true},
  nature:{kind:'regen',turns:3,self:true},
  chaos:{kind:'confusion',turns:2},
  neutre:null,
};
const ENERGY_ACT=24;   // énergie gagnée quand on agit
const ENERGY_HIT=12;   // énergie gagnée quand on encaisse

function soloMoves(rock){
  const typeInfo=ROCK_TYPES.find(t=>t.key===rock.rockType);
  return [
    { id:'attack', label:'⚔️ Frappe', cost:0, mult:1.4, kind:'basic' },
    { id:'type', label:typeInfo?typeInfo.label:'⬜ TYPE', cost:0, mult:1.2, kind:'type' },
    { id:'special', label:'⚡ Spéciale', cost:50, mult:2.2, kind:'special' },
    { id:'ultimate', label:'🌟 Ultime', cost:100, mult:3.4, kind:'ultimate' },
  ];
}
function addStatus(side,kind,turns){
  const key=side+'Status';
  const arr=battleState[key]||(battleState[key]=[]);
  const ex=arr.find(s=>s.kind===kind);
  if(ex) ex.turns=Math.max(ex.turns,turns); else arr.push({kind,turns});
}
function hasStatus(side,kind){ return (battleState[side+'Status']||[]).some(s=>s.kind===kind); }
function outgoingMult(side){ return hasStatus(side,'malediction')?0.7:1; }
function incomingMult(side){ return hasStatus(side,'blindage')?0.65:1; }
function applyMoveStatus(attackerSide,defenderSide,rock,strongTurns){
  const cfg=TYPE_STATUS[rock.rockType];
  if(!cfg) return;
  const side=cfg.self?attackerSide:defenderSide;
  addStatus(side,cfg.kind,strongTurns||cfg.turns);
  const d=STATUS_DEFS[cfg.kind];
  const who=(side==='player'?battleState.playerRock:battleState.botRock).name;
  addCombatLog(`${d.icon} ${who} : ${d.name} !`, cfg.self?'neutral':(side==='player'?'dmg-player':'dmg-bot'));
}
// Tick des statuts au début du tour d'un camp. Renvoie {skip, dead}
function tickStatuses(side){
  const arr=battleState[side+'Status']||[];
  const isP=side==='player';
  const rock=isP?battleState.playerRock:battleState.botRock;
  const hpKey=isP?'playerHP':'botHP', maxKey=isP?'playerMaxHP':'botMaxHP';
  let skip=false;
  for(const st of arr){
    if(st.kind==='brulure'){
      const d=Math.max(4,Math.round(battleState[maxKey]*0.06));
      battleState[hpKey]=Math.max(0,battleState[hpKey]-d);
      addCombatLog(`🔥 ${rock.name} se consume : -${d} PV`, isP?'dmg-player':'dmg-bot');
      spawnHitFx(isP?'playerSprite':'botSprite',{dmg:d,color:'#FF6B35'});
    } else if(st.kind==='regen'){
      const h=Math.max(5,Math.round(battleState[maxKey]*0.07));
      battleState[hpKey]=Math.min(battleState[maxKey],battleState[hpKey]+h);
      addCombatLog(`🌿 ${rock.name} régénère : +${h} PV`,'neutral');
      spawnHitFx(isP?'playerSprite':'botSprite',{dmg:h,heal:true,color:'#27AE60'});
    } else if(st.kind==='gel'){ skip=true; }
  }
  battleState[side+'Status']=arr.map(s=>({...s,turns:s.turns-1})).filter(s=>s.turns>0);
  return {skip, dead:battleState[hpKey]<=0};
}

/* Mini-jeu de timing : vise (attaque) ou pare (défense). Renvoie un multiplicateur. */
function timingChallenge(kind){
  return new Promise(resolve=>{
    const isAtk=kind==='attack';
    const ov=document.createElement('div'); ov.className='timing-ov';
    ov.innerHTML=`<div class="timing-card">
      <div class="timing-title ${isAtk?'atk':'def'}">${isAtk?'⚔️ VISE !':'🛡️ PARE !'}</div>
      <div class="timing-track"><div class="timing-good"></div><div class="timing-perfect"></div><div class="timing-marker" id="tMarker"></div></div>
      <div class="timing-hint">${isAtk?'Touche dans la zone verte':'Touche pile au centre pour bloquer'}</div>
      <div class="timing-result" id="tResult"></div>
    </div>`;
    document.body.appendChild(ov);
    const marker=ov.querySelector('#tMarker');
    const DUR=1050; let raf, start=performance.now(), done=false;
    const posNow=()=>{ const e=((performance.now()-start)%DUR)/DUR; return e<0.5?e*2:2-e*2; };
    function frame(){ if(done) return; marker.style.left=(posNow()*100)+'%'; raf=requestAnimationFrame(frame); }
    raf=requestAnimationFrame(frame);
    function finish(){
      if(done) return; done=true; cancelAnimationFrame(raf);
      const d=Math.abs(posNow()-0.5);
      let mult,txt,cls;
      if(isAtk){
        if(d<0.07){mult=1.6;txt='PARFAIT ! +60%';cls='perfect';}
        else if(d<0.17){mult=1.25;txt='Bien ! +25%';cls='good';}
        else {mult=0.85;txt='Raté... -15%';cls='miss';}
      } else {
        if(d<0.07){mult=0.15;txt='BLOCAGE PARFAIT !';cls='perfect';}
        else if(d<0.18){mult=0.5;txt='Paré ! -50%';cls='good';}
        else {mult=1.0;txt='Trop tard !';cls='miss';}
      }
      marker.classList.add(cls);
      const res=ov.querySelector('#tResult'); res.textContent=txt; res.className='timing-result '+cls;
      if(navigator.vibrate) navigator.vibrate(cls==='perfect'?[15,25,35]:15);
      setTimeout(()=>{ ov.remove(); resolve(mult); },480);
    }
    ov.addEventListener('pointerdown',finish);
    setTimeout(finish,2400);
  });
}

async function initBattle(playerRock){
  const bot=makeBotRock();
  const playerSpriteUrl=await makeRockSprite(playerRock.photo,playerRock.id);
  let effRock=playerRock;
  const usedBuffs=[];
  if((meta.inventory?.mighty||0)>0){
    meta.inventory.mighty--;
    effRock={...playerRock, atk:Math.round(playerRock.atk*1.2), def:Math.round(playerRock.def*1.2)};
    usedBuffs.push('💪 Caillou Costaud');
  }
  battleState={
    playerRock:effRock, botRock:bot,
    playerHP:combatMaxHP(effRock.def), botHP:combatMaxHP(bot.def),
    playerMaxHP:combatMaxHP(effRock.def), botMaxHP:combatMaxHP(bot.def),
    playerSpecialUsed:false, botSpecialUsed:false, playerUltimateUsed:false, botUltimateUsed:false,
    log:[{text:`⚔️ ${playerRock.name} affronte ${bot.name} !`, cls:'neutral'}],
    turn:'animating', winner:null, entered:false,
    playerSpriteUrl, botSpriteUrl:null,
    shieldActive:false, critPending:false,
    playerEnergy:0, botEnergy:0, playerStatus:[], botStatus:[], turnCount:0,
  };
  if((meta.inventory?.shield||0)>0){ meta.inventory.shield--; battleState.shieldActive=true; usedBuffs.push('🛡️ Bouclier'); }
  if((meta.inventory?.crit||0)>0){ meta.inventory.crit--; battleState.critPending=true; usedBuffs.push('💥 Frappe Critique'); }
  if(usedBuffs.length){ saveMeta(); setTimeout(()=>showToast('✨ Objets activés : '+usedBuffs.join(', ')),250); }
  screen='combat-fight'; render();
  generateBotCharacter(bot);
  setTimeout(async()=>{
    if(!battleState||battleState.turn==='end'||screen!=='combat-fight') return;
    await announceTurn('player');
    if(battleState&&battleState.turn==='animating'){ battleState.turn='player'; render(); }
  },900);
}

function addCombatLog(text,cls='neutral'){

function announceTurn(kind){
